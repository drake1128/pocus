<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="hatch-r" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#000" stroke-width="1"/>
    </pattern>
    <pattern id="hatch-l" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#000" stroke-width="1"/>
    </pattern>
    <pattern id="xhatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="4" stroke="#000" stroke-width="0.7"/>
      <line x1="4" y1="0" x2="0" y2="4" stroke="#000" stroke-width="0.7"/>
    </pattern>
    <pattern id="dense-hatch" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#000" stroke-width="1.2"/>
    </pattern>
    <pattern id="thrombus" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="4" stroke="#000" stroke-width="1"/>
      <line x1="4" y1="0" x2="0" y2="4" stroke="#000" stroke-width="1"/>
      <line x1="0" y1="2" x2="4" y2="2" stroke="#000" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="#fff"/>
  <rect x="8" y="8" width="784" height="584" fill="none" stroke="#000" stroke-width="4"/>
  <rect x="14" y="14" width="772" height="572" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#000">Pulmonary Embolism &amp; DVT</text>
  <text x="400" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#000">肺栓塞與深層靜脈栓塞</text>
  <line x1="80" y1="82" x2="720" y2="82" stroke="#000" stroke-width="2.5"/>

  <!-- Central divider -->
  <line x1="400" y1="90" x2="400" y2="530" stroke="#000" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- ===== LEFT HALF: Heart with dilated RV ===== -->
  <g transform="translate(200, 290)">
    <!-- Heart outline (anterior view, anatomical) -->
    <!-- Pericardium -->
    <path d="M0,-120 C-60,-110 -120,-60 -130,10 C-135,60 -100,110 -50,130 C-20,142 20,142 50,130 C100,110 135,60 130,10 C120,-60 60,-110 0,-120Z" fill="#fff" stroke="#000" stroke-width="3.5"/>
    <path d="M0,-120 C-60,-110 -120,-60 -130,10 C-135,60 -100,110 -50,130 C-20,142 20,142 50,130 C100,110 135,60 130,10 C120,-60 60,-110 0,-120Z" fill="url(#hatch-r)" opacity="0.1"/>

    <!-- Septum -->
    <path d="M0,-100 C10,-50 15,20 10,120" fill="none" stroke="#000" stroke-width="3"/>

    <!-- RV (RIGHT side of image = anatomical RV, DILATED) -->
    <path d="M-120,-10 C-110,-70 -60,-100 0,-100" fill="none" stroke="#000" stroke-width="2.5"/>
    <path d="M-120,-10 C-115,50 -80,100 -10,120" fill="none" stroke="#000" stroke-width="2.5"/>
    <!-- RV cavity hatching to show dilation -->
    <ellipse cx="-55" cy="10" rx="50" ry="65" fill="url(#hatch-l)" opacity="0.15"/>

    <!-- LV (LEFT side = anatomical LV, compressed) -->
    <path d="M120,-10 C110,-70 60,-100 0,-100" fill="none" stroke="#000" stroke-width="2.5"/>
    <path d="M120,-10 C115,50 80,100 10,120" fill="none" stroke="#000" stroke-width="2.5"/>

    <!-- Labels -->
    <text x="-55" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#000">RV</text>
    <text x="60" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#000">LV</text>

    <!-- Size comparison arrows -->
    <line x1="-100" y1="75" x2="-10" y2="75" stroke="#000" stroke-width="2"/>
    <polygon points="-10,73 -10,77 -5,75" fill="#000"/>
    <polygon points="-100,73 -100,77 -105,75" fill="#000"/>
    <text x="-55" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#000">RV &gt;&gt; LV</text>

    <line x1="25" y1="75" x2="95" y2="75" stroke="#000" stroke-width="1.5"/>
    <polygon points="25,73 25,77 20,75" fill="#000"/>
    <polygon points="95,73 95,77 100,75" fill="#000"/>

    <!-- Pulmonary artery from RV going up -->
    <path d="M-40,-100 C-50,-140 -30,-155 -10,-150" fill="none" stroke="#000" stroke-width="3"/>
    <path d="M-55,-95 C-65,-135 -45,-155 -25,-150" fill="none" stroke="#000" stroke-width="3"/>
    <!-- PA label -->
    <text x="-50" y="-155" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#000">PA</text>

    <!-- Thrombus in PA -->
    <ellipse cx="-35" cy="-135" rx="8" ry="5" fill="url(#thrombus)" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Small lung icon (top center-left) -->
  <g transform="translate(280, 120)">
    <!-- Lung shape -->
    <path d="M0,-20 C-25,-15 -40,5 -35,25 C-30,40 -15,45 0,40 C15,45 30,40 35,25 C40,5 25,-15 0,-20Z" fill="#fff" stroke="#000" stroke-width="2.5"/>
    <path d="M0,-20 C-25,-15 -40,5 -35,25 C-30,40 -15,45 0,40 C15,45 30,40 35,25 C40,5 25,-15 0,-20Z" fill="url(#hatch-r)" opacity="0.15"/>
    <!-- Bronchi -->
    <line x1="0" y1="-15" x2="-12" y2="5" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="-15" x2="12" y2="5" stroke="#000" stroke-width="2"/>
    <line x1="-12" y1="5" x2="-20" y2="15" stroke="#000" stroke-width="1.5"/>
    <line x1="12" y1="5" x2="20" y2="15" stroke="#000" stroke-width="1.5"/>
    <!-- PA vessels in lung -->
    <path d="M-8,0 C-15,8 -22,12 -28,18" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M8,0 C15,8 22,12 28,18" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="0" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#000">肺動脈</text>
  </g>

  <!-- ===== RIGHT HALF: Leg with DVT ===== -->
  <g transform="translate(600, 300)">
    <!-- Leg outline -->
    <path d="M-40,-180 C-50,-140 -55,-80 -55,0 C-55,60 -50,120 -45,160" fill="none" stroke="#000" stroke-width="3.5"/>
    <path d="M40,-180 C50,-140 55,-80 55,0 C55,60 50,120 45,160" fill="none" stroke="#000" stroke-width="3.5"/>
    <!-- Leg hatching -->
    <path d="M-40,-180 C-50,-140 -55,-80 -55,0 C-55,60 -50,120 -45,160 L45,160 C50,120 55,60 55,0 C55,-80 50,-140 40,-180Z" fill="url(#hatch-r)" opacity="0.1"/>

    <!-- Knee area -->
    <ellipse cx="0" cy="-60" rx="52" ry="20" fill="none" stroke="#000" stroke-width="1.5" opacity="0.5"/>

    <!-- Femoral vein (inside leg) -->
    <path d="M-8,-160 C-10,-120 -12,-60 -10,20 C-8,70 -5,120 -3,150" fill="none" stroke="#000" stroke-width="2.5"/>
    <path d="M8,-160 C10,-120 12,-60 10,20 C8,70 5,120 3,150" fill="none" stroke="#000" stroke-width="2.5"/>

    <!-- DVT thrombus in vein -->
    <ellipse cx="0" cy="30" rx="9" ry="35" fill="url(#thrombus)" stroke="#000" stroke-width="2.5"/>
    <!-- Thrombus label -->
    <line x1="15" y1="30" x2="55" y2="30" stroke="#000" stroke-width="1.5"/>
    <text x="58" y="28" font-family="Georgia, serif" font-size="11" fill="#000" font-weight="bold">DVT</text>
    <text x="58" y="42" font-family="Georgia, serif" font-size="10" fill="#000">血栓</text>

    <!-- Foot -->
    <path d="M-45,160 C-42,170 -30,178 -10,180 C10,180 30,178 40,172 L45,160" fill="none" stroke="#000" stroke-width="3"/>

    <!-- Vein label -->
    <text x="-35" y="-130" font-family="Georgia, serif" font-size="10" fill="#000">股靜脈</text>
  </g>

  <!-- ===== DOTTED ARROW: Embolism path from leg to lung ===== -->
  <!-- Arrow from DVT in leg upward to lung/PA -->
  <path d="M590,340 C570,280 520,220 450,180 C420,165 380,150 330,140" fill="none" stroke="#000" stroke-width="3" stroke-dasharray="10,6"/>
  <!-- Arrowhead -->
  <polygon points="330,136 330,144 322,140" fill="#000"/>

  <!-- Small embolus traveling along the path -->
  <ellipse cx="480" cy="200" rx="8" ry="5" fill="#000" stroke="#000" stroke-width="1" transform="rotate(-30,480,200)"/>
  <ellipse cx="420" cy="170" rx="6" ry="4" fill="#000" stroke="#000" stroke-width="1" transform="rotate(-20,420,170)"/>

  <!-- Path label -->
  <text x="500" y="185" font-family="Georgia, serif" font-size="12" fill="#000" font-style="italic" transform="rotate(-25,500,185)">Embolism path</text>

  <!-- Bottom label bar -->
  <rect x="200" y="540" width="400" height="36" rx="4" fill="#000"/>
  <text x="400" y="564" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#fff" letter-spacing="2">Module 06 — PE &amp; DVT</text>

  <!-- Corner decorations -->
  <path d="M18,18 L52,18 L52,23 L23,23 L23,52 L18,52Z" fill="#000"/>
  <path d="M782,18 L748,18 L748,23 L777,23 L777,52 L782,52Z" fill="#000"/>
  <path d="M18,582 L52,582 L52,577 L23,577 L23,548 L18,548Z" fill="#000"/>
  <path d="M782,582 L748,582 L748,577 L777,577 L777,548 L782,548Z" fill="#000"/>
</svg>