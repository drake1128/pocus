<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="hatch45" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#000" stroke-width="1.2"/>
    </pattern>
    <pattern id="hatch135" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#000" stroke-width="1.2"/>
    </pattern>
    <pattern id="crosshatch" patternUnits="userSpaceOnUse" width="5" height="5">
      <line x1="0" y1="0" x2="5" y2="5" stroke="#000" stroke-width="0.8"/>
      <line x1="5" y1="0" x2="0" y2="5" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <pattern id="dense-hatch" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(60)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#000" stroke-width="1"/>
    </pattern>
    <pattern id="vert-hatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="2" y1="0" x2="2" y2="4" stroke="#000" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#fff"/>

  <!-- Heavy border -->
  <rect x="8" y="8" width="784" height="584" fill="none" stroke="#000" stroke-width="5"/>
  <rect x="15" y="15" width="770" height="570" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- ===== MONITOR AT TOP ===== -->
  <g transform="translate(400, 60)">
    <!-- Monitor frame -->
    <rect x="-180" y="-40" width="360" height="70" rx="6" fill="#000" stroke="#000" stroke-width="3"/>
    <!-- Screen -->
    <rect x="-170" y="-33" width="340" height="56" rx="3" fill="#fff" stroke="#000" stroke-width="2"/>

    <!-- PEA/Flatline rhythm -->
    <polyline points="-155,-5 -130,-5 -125,-5 -120,-20 -115,10 -110,-8 -105,-5 -60,-5 -55,-5 -50,-20 -45,10 -40,-8 -35,-5 10,-5 15,-5 20,-20 25,10 30,-8 35,-5 80,-5 85,-5 90,-20 95,10 100,-8 105,-5 160,-5"
      fill="none" stroke="#000" stroke-width="2.5"/>

    <!-- HR display -->
    <text x="-155" y="-18" font-family="monospace" font-size="11" fill="#000">HR: --</text>
    <text x="120" y="-18" font-family="monospace" font-size="11" fill="#000">PEA</text>

    <!-- Monitor stand -->
    <rect x="-8" y="30" width="16" height="15" fill="#000"/>
    <rect x="-25" y="42" width="50" height="5" rx="2" fill="#000"/>
  </g>

  <!-- ===== PATIENT ON TABLE ===== -->
  <!-- Table surface -->
  <rect x="100" y="445" width="600" height="14" fill="url(#hatch45)" stroke="#000" stroke-width="3" opacity="0.5"/>
  <rect x="100" y="445" width="600" height="14" fill="none" stroke="#000" stroke-width="3"/>

  <!-- Patient body (torso) -->
  <ellipse cx="420" cy="380" rx="140" ry="60" fill="#fff" stroke="#000" stroke-width="3.5"/>
  <ellipse cx="420" cy="380" rx="135" ry="55" fill="url(#hatch45)" opacity="0.15"/>

  <!-- Patient chest detail -->
  <line x1="380" y1="340" x2="380" y2="420" stroke="#000" stroke-width="1.5" opacity="0.4"/>
  <line x1="460" y1="340" x2="460" y2="420" stroke="#000" stroke-width="1.5" opacity="0.4"/>

  <!-- Patient head -->
  <ellipse cx="620" cy="370" rx="38" ry="45" fill="#fff" stroke="#000" stroke-width="3.5"/>
  <ellipse cx="620" cy="370" rx="33" ry="40" fill="url(#dense-hatch)" opacity="0.15"/>
  <!-- Closed eyes, mouth (intubated) -->
  <line x1="607" y1="362" x2="617" y2="362" stroke="#000" stroke-width="2.5"/>
  <line x1="625" y1="362" x2="635" y2="362" stroke="#000" stroke-width="2.5"/>
  <!-- ET tube -->
  <rect x="615" y="380" width="10" height="25" rx="2" fill="#fff" stroke="#000" stroke-width="2"/>
  <line x1="620" y1="405" x2="620" y2="445" stroke="#000" stroke-width="2.5"/>

  <!-- Patient neck -->
  <rect x="575" y="358" width="18" height="28" fill="#fff" stroke="#000" stroke-width="2.5"/>

  <!-- Patient legs -->
  <path d="M280,410 L230,445" fill="none" stroke="#000" stroke-width="3.5"/>
  <path d="M310,415 L270,445" fill="none" stroke="#000" stroke-width="3.5"/>

  <!-- ===== HANDS DOING CPR ===== -->
  <g transform="translate(420, 310)">
    <!-- Arms coming down -->
    <path d="M-20,-100 C-15,-70 -10,-40 -5,0" fill="none" stroke="#000" stroke-width="4"/>
    <path d="M20,-100 C15,-70 10,-40 5,0" fill="none" stroke="#000" stroke-width="4"/>

    <!-- Interlocked hands -->
    <ellipse cx="0" cy="10" rx="28" ry="14" fill="#fff" stroke="#000" stroke-width="3.5"/>
    <!-- Fingers detail -->
    <path d="M-20,5 C-22,8 -24,14 -20,16" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M-14,3 C-16,7 -18,13 -14,16" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M-7,2 C-9,7 -10,14 -7,16" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M0,2 C-2,7 -2,14 0,16" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M7,2 C5,7 4,14 7,16" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M14,3 C12,7 11,13 14,16" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M20,5 C18,8 17,14 20,16" fill="none" stroke="#000" stroke-width="2"/>

    <!-- Compression force arrows -->
    <line x1="-30" y1="-30" x2="-15" y2="-10" stroke="#000" stroke-width="2.5"/>
    <polygon points="-17,-14 -13,-8 -19,-8" fill="#000"/>
    <line x1="30" y1="-30" x2="15" y2="-10" stroke="#000" stroke-width="2.5"/>
    <polygon points="17,-14 13,-8 19,-8" fill="#000"/>

    <!-- Sleeves / forearm hatching -->
    <path d="M-25,-100 L-15,-100" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M15,-100 L25,-100" fill="none" stroke="#000" stroke-width="2"/>
  </g>

  <!-- ===== ULTRASOUND PROBE AT SUBXIPHOID ===== -->
  <g transform="translate(480, 410) rotate(25)">
    <!-- Probe body -->
    <rect x="-7" y="-35" width="14" height="30" rx="3" fill="#000" stroke="#000" stroke-width="2"/>
    <!-- Probe tip -->
    <rect x="-9" y="-8" width="18" height="10" rx="2" fill="#fff" stroke="#000" stroke-width="2.5"/>
    <!-- Cable -->
    <path d="M0,-35 C15,-50 30,-55 50,-50" fill="none" stroke="#000" stroke-width="2.5"/>
  </g>

  <!-- Ultrasound waves from subxiphoid probe -->
  <path d="M490,395 Q510,375 505,355" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="3,2"/>
  <path d="M495,398 Q518,378 512,355" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- ===== ULTRASOUND SCREEN (bottom left) ===== -->
  <g transform="translate(130, 350)">
    <!-- Machine body -->
    <rect x="-90" y="-80" width="180" height="150" rx="8" fill="#000" stroke="#000" stroke-width="3"/>
    <!-- Screen -->
    <rect x="-78" y="-72" width="156" height="105" rx="4" fill="#fff" stroke="#000" stroke-width="2"/>

    <!-- Ultrasound sector display -->
    <path d="M0,-65 L-65,25 A72,72 0 0,0 65,25 Z" fill="url(#vert-hatch)" stroke="#000" stroke-width="1.5" opacity="0.2"/>
    <path d="M0,-65 L-65,25 A72,72 0 0,0 65,25 Z" fill="none" stroke="#000" stroke-width="2"/>

    <!-- Heart on screen (4 chamber subxiphoid view) -->
    <!-- Pericardium -->
    <ellipse cx="0" cy="-15" rx="40" ry="32" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Chambers -->
    <line x1="0" y1="-45" x2="0" y2="15" stroke="#000" stroke-width="2"/>
    <line x1="-38" y1="-15" x2="38" y2="-15" stroke="#000" stroke-width="2"/>
    <!-- Chamber labels -->
    <text x="-18" y="-25" text-anchor="middle" font-family="monospace" font-size="8" fill="#000">RV</text>
    <text x="18" y="-25" text-anchor="middle" font-family="monospace" font-size="8" fill="#000">LV</text>
    <text x="-18" y="-3" text-anchor="middle" font-family="monospace" font-size="8" fill="#000">RA</text>
    <text x="18" y="-3" text-anchor="middle" font-family="monospace" font-size="8" fill="#000">LA</text>

    <!-- Some wall motion shown by dashes -->
    <line x1="-30" y1="-30" x2="-25" y2="-30" stroke="#000" stroke-width="1.5" stroke-dasharray="2,2"/>
    <line x1="25" y1="-30" x2="30" y2="-30" stroke="#000" stroke-width="1.5" stroke-dasharray="2,2"/>

    <!-- "PAUSE" text on screen -->
    <text x="50" y="-58" font-family="monospace" font-size="8" fill="#000">PAUSE</text>

    <!-- Controls below screen -->
    <circle cx="-40" cy="45" r="6" fill="#fff" stroke="#000" stroke-width="2"/>
    <circle cx="-15" cy="45" r="6" fill="#fff" stroke="#000" stroke-width="2"/>
    <circle cx="10" cy="45" r="6" fill="#fff" stroke="#000" stroke-width="2"/>
    <rect x="30" y="40" width="30" height="12" rx="2" fill="#fff" stroke="#000" stroke-width="1.5"/>

    <!-- Cable going to probe -->
    <path d="M90,30 C120,20 140,10 160,0" fill="none" stroke="#000" stroke-width="2.5"/>
  </g>

  <!-- ===== "10-SECOND PAUSE" text ===== -->
  <g transform="translate(400, 520)">
    <rect x="-160" y="-18" width="320" height="36" rx="4" fill="#000"/>
    <text x="0" y="6" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#fff" letter-spacing="2">Module 05 — Cardiac Arrest</text>
  </g>

  <!-- Urgency radiating lines around hands -->
  <line x1="370" y1="250" x2="355" y2="235" stroke="#000" stroke-width="2.5"/>
  <line x1="400" y1="240" x2="400" y2="220" stroke="#000" stroke-width="2.5"/>
  <line x1="430" y1="245" x2="440" y2="228" stroke="#000" stroke-width="2.5"/>
  <line x1="450" y1="260" x2="468" y2="248" stroke="#000" stroke-width="2.5"/>
  <line x1="350" y1="260" x2="335" y2="250" stroke="#000" stroke-width="2.5"/>

  <!-- Title at very top -->
  <text x="400" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#000" font-style="italic">Subxiphoid view during pulse check pause</text>

  <!-- Corner decorations -->
  <path d="M18,18 L52,18 L52,23 L23,23 L23,52 L18,52Z" fill="#000"/>
  <path d="M782,18 L748,18 L748,23 L777,23 L777,52 L782,52Z" fill="#000"/>
  <path d="M18,582 L52,582 L52,577 L23,577 L23,548 L18,548Z" fill="#000"/>
  <path d="M782,582 L748,582 L748,577 L777,577 L777,548 L782,548Z" fill="#000"/>
</svg>