<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <title>Module 07: Acute Abdominal Pain - Cover</title>
  <defs>
    <!-- Cross-hatching patterns -->
    <pattern id="hatch-light" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="1"/>
    </pattern>
    <pattern id="hatch-medium" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#000" stroke-width="1.2"/>
    </pattern>
    <pattern id="hatch-dense" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#000" stroke-width="1"/>
    </pattern>
    <pattern id="cross-hatch" patternUnits="userSpaceOnUse" width="5" height="5">
      <line x1="0" y1="0" x2="5" y2="5" stroke="#000" stroke-width="0.8"/>
      <line x1="5" y1="0" x2="0" y2="5" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <pattern id="cross-hatch-dense" patternUnits="userSpaceOnUse" width="3" height="3">
      <line x1="0" y1="0" x2="3" y2="3" stroke="#000" stroke-width="0.7"/>
      <line x1="3" y1="0" x2="0" y2="3" stroke="#000" stroke-width="0.7"/>
    </pattern>
    <pattern id="stipple" patternUnits="userSpaceOnUse" width="8" height="8">
      <circle cx="1" cy="1" r="0.7" fill="#000"/>
      <circle cx="5" cy="5" r="0.7" fill="#000"/>
      <circle cx="5" cy="1" r="0.5" fill="#000"/>
      <circle cx="1" cy="5" r="0.5" fill="#000"/>
    </pattern>
    <pattern id="vertical-lines" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="2" y1="0" x2="2" y2="4" stroke="#000" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#fff"/>

  <!-- Border frame with woodcut style -->
  <rect x="8" y="8" width="784" height="584" fill="none" stroke="#000" stroke-width="5"/>
  <rect x="14" y="14" width="772" height="572" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Exam table / bed surface -->
  <path d="M50,520 L750,520 L750,560 L50,560 Z" fill="url(#hatch-light)" stroke="#000" stroke-width="3"/>
  <line x1="50" y1="520" x2="750" y2="520" stroke="#000" stroke-width="4"/>

  <!-- Patient body - supine position -->
  <!-- Head (left side) -->
  <ellipse cx="120" cy="430" rx="40" ry="50" fill="#fff" stroke="#000" stroke-width="4"/>
  <path d="M100,410 Q110,395 120,390 Q130,395 140,410" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Hair hatching on head -->
  <path d="M85,420 Q90,390 120,380 Q150,390 155,420" fill="url(#cross-hatch-dense)" stroke="#000" stroke-width="3"/>
  <!-- Eye (closed) -->
  <line x1="108" y1="425" x2="118" y2="425" stroke="#000" stroke-width="2.5"/>
  <!-- Nose -->
  <path d="M120,432 L123,440 L118,442" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Pillow -->
  <path d="M70,455 Q80,440 120,438 Q160,440 170,455 Q165,475 120,478 Q75,475 70,455 Z" fill="url(#hatch-light)" stroke="#000" stroke-width="3"/>

  <!-- Neck -->
  <path d="M135,475 L155,490 L160,510" fill="none" stroke="#000" stroke-width="3.5"/>
  <path d="M105,475 L100,490 L98,510" fill="none" stroke="#000" stroke-width="3.5"/>

  <!-- Torso / Chest -->
  <path d="M98,490 L90,510 L90,515 L240,515 L240,510 L160,490" fill="url(#stipple)" stroke="#000" stroke-width="3"/>

  <!-- Abdomen - main area of interest, more detailed -->
  <path d="M240,480 L240,515 L520,515 L520,480 Q480,440 380,430 Q280,440 240,480 Z" fill="#fff" stroke="#000" stroke-width="3.5"/>

  <!-- Abdominal surface contour lines -->
  <path d="M260,500 Q380,470 500,500" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M270,490 Q380,460 490,490" fill="none" stroke="#000" stroke-width="1"/>
  <path d="M280,480 Q380,455 480,480" fill="none" stroke="#000" stroke-width="0.8"/>

  <!-- Navel -->
  <ellipse cx="380" cy="490" rx="6" ry="8" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="380" cy="490" r="2" fill="#000"/>

  <!-- Internal organ silhouettes visible through abdomen (ghosted/x-ray style) -->
  <!-- Liver (RUQ) -->
  <path d="M280,460 Q310,445 360,448 Q370,455 365,470 Q340,478 300,475 Q280,472 280,460 Z" fill="url(#hatch-light)" stroke="#000" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Gallbladder -->
  <path d="M345,465 Q352,460 355,468 L350,480 Q345,484 342,478 Z" fill="#fff" stroke="#000" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- Right Kidney -->
  <path d="M290,478 Q295,470 305,470 Q315,470 318,478 Q315,490 305,492 Q295,490 290,478 Z" fill="url(#stipple)" stroke="#000" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Aorta (central line) -->
  <line x1="380" y1="448" x2="380" y2="510" stroke="#000" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="376" y1="448" x2="376" y2="510" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="384" y1="448" x2="384" y2="510" stroke="#000" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Left Kidney -->
  <path d="M430,478 Q435,470 445,470 Q455,470 458,478 Q455,490 445,492 Q435,490 430,478 Z" fill="url(#stipple)" stroke="#000" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Legs -->
  <path d="M520,480 L520,515 L620,515 L620,500 Q580,480 520,480 Z" fill="url(#hatch-light)" stroke="#000" stroke-width="3"/>
  <path d="M620,500 L620,515 L720,515 L720,510 Q680,495 620,500 Z" fill="url(#hatch-medium)" stroke="#000" stroke-width="3"/>
  <!-- Feet -->
  <path d="M720,495 L740,490 L748,492 L748,510 L720,510 Z" fill="#fff" stroke="#000" stroke-width="3"/>

  <!-- Doctor/Sonographer figure -->
  <!-- Doctor torso (standing at patient's right side) -->
  <path d="M300,150 L260,150 Q240,155 235,180 L225,320 L240,325 L250,200 L260,180 L300,175 L340,180 L350,200 L360,325 L375,320 L365,180 Q360,155 340,150 Z" fill="#fff" stroke="#000" stroke-width="3.5"/>

  <!-- White coat details - lapels -->
  <path d="M270,155 L280,180 L290,200 L290,320" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M330,155 L320,180 L310,200 L310,320" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Coat buttons -->
  <circle cx="300" cy="210" r="3" fill="#000"/>
  <circle cx="300" cy="240" r="3" fill="#000"/>
  <circle cx="300" cy="270" r="3" fill="#000"/>
  <!-- Pocket -->
  <rect x="245" y="230" width="30" height="25" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="248" y1="235" x2="258" y2="235" stroke="#000" stroke-width="1.5"/>

  <!-- Doctor head -->
  <ellipse cx="300" cy="115" rx="35" ry="42" fill="#fff" stroke="#000" stroke-width="3.5"/>
  <!-- Hair -->
  <path d="M268,100 Q270,75 300,70 Q330,75 332,100" fill="url(#cross-hatch-dense)" stroke="#000" stroke-width="2.5"/>
  <!-- Eyes -->
  <ellipse cx="287" cy="112" rx="5" ry="3" fill="#000"/>
  <ellipse cx="313" cy="112" rx="5" ry="3" fill="#000"/>
  <!-- Eyebrows -->
  <path d="M280,106 Q287,103 294,106" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M306,106 Q313,103 320,106" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Nose -->
  <path d="M300,115 L297,125 L303,127" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Mouth - focused expression -->
  <path d="M292,133 Q300,136 308,133" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Ear -->
  <path d="M335,108 Q342,112 340,122 Q338,128 333,125" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Doctor's right arm holding probe - reaching to patient abdomen RUQ -->
  <path d="M340,180 Q360,220 370,280 Q375,330 360,380 Q350,420 340,445" fill="none" stroke="#000" stroke-width="4"/>
  <!-- Forearm hatching -->
  <path d="M355,300 Q365,340 360,380" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Hand holding probe -->
  <path d="M330,440 Q335,435 340,440 L345,455 Q348,462 340,465 L330,462 Q325,458 325,450 Z" fill="#fff" stroke="#000" stroke-width="3"/>
  <!-- Fingers wrapped around probe -->
  <path d="M328,445 L325,455" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M332,447 L330,458" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M342,448 L345,458" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Ultrasound probe on RUQ -->
  <rect x="332" y="462" width="16" height="30" rx="3" fill="#fff" stroke="#000" stroke-width="3"/>
  <rect x="335" y="490" width="10" height="5" rx="2" fill="#000" stroke="#000" stroke-width="2"/>
  <!-- Probe cable -->
  <path d="M340,462 Q320,420 310,380 Q290,320 270,290 Q250,270 200,250 Q150,235 120,230" fill="none" stroke="#000" stroke-width="3"/>

  <!-- Doctor's left arm (at side / on machine) -->
  <path d="M260,180 Q240,220 230,260 Q220,290 215,310 Q210,330 200,340" fill="none" stroke="#000" stroke-width="3.5"/>
  <!-- Left hand on machine -->
  <path d="M195,335 Q190,340 192,348 Q195,355 202,352 L208,345 Q210,340 205,335 Z" fill="#fff" stroke="#000" stroke-width="2.5"/>

  <!-- Ultrasound machine -->
  <!-- Machine body -->
  <path d="M50,200 L170,200 L170,420 L50,420 Z" fill="#fff" stroke="#000" stroke-width="4"/>
  <!-- Machine hatching for body -->
  <rect x="50" y="340" width="120" height="80" fill="url(#hatch-medium)" stroke="none"/>

  <!-- Machine screen -->
  <rect x="60" y="210" width="100" height="80" fill="#000" stroke="#000" stroke-width="3"/>

  <!-- Gallbladder image on screen -->
  <!-- Sector shape on screen -->
  <path d="M110,215 L75,280 Q110,290 145,280 Z" fill="#000" stroke="#fff" stroke-width="1.5"/>
  <!-- Gallbladder on screen (white on black) -->
  <path d="M100,240 Q108,232 115,240 L112,265 Q108,272 105,265 Z" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Gallstone -->
  <circle cx="108" cy="248" r="3" fill="#fff"/>
  <!-- Acoustic shadow -->
  <path d="M105,251 L100,280" stroke="#fff" stroke-width="0.8"/>
  <path d="M111,251 L116,280" stroke="#fff" stroke-width="0.8"/>
  <!-- Wall lines -->
  <path d="M98,242 Q106,235 113,242" fill="none" stroke="#fff" stroke-width="1"/>

  <!-- Machine controls -->
  <circle cx="75" cy="310" r="8" fill="#fff" stroke="#000" stroke-width="2.5"/>
  <circle cx="75" cy="310" r="3" fill="#000"/>
  <circle cx="105" cy="310" r="6" fill="url(#cross-hatch)" stroke="#000" stroke-width="2"/>
  <circle cx="135" cy="310" r="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <!-- Buttons row -->
  <rect x="65" y="330" width="10" height="6" rx="1" fill="#000" stroke="#000" stroke-width="1"/>
  <rect x="80" y="330" width="10" height="6" rx="1" fill="#000" stroke="#000" stroke-width="1"/>
  <rect x="95" y="330" width="10" height="6" rx="1" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="110" y="330" width="10" height="6" rx="1" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="125" y="330" width="10" height="6" rx="1" fill="#000" stroke="#000" stroke-width="1"/>

  <!-- Machine wheels -->
  <circle cx="70" cy="425" r="12" fill="url(#cross-hatch)" stroke="#000" stroke-width="3"/>
  <circle cx="70" cy="425" r="4" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="150" cy="425" r="12" fill="url(#cross-hatch)" stroke="#000" stroke-width="3"/>
  <circle cx="150" cy="425" r="4" fill="#fff" stroke="#000" stroke-width="2"/>

  <!-- Machine stand -->
  <line x1="70" y1="420" x2="70" y2="413" stroke="#000" stroke-width="3"/>
  <line x1="150" y1="420" x2="150" y2="413" stroke="#000" stroke-width="3"/>

  <!-- Ultrasound wave emanation from probe (into abdomen) -->
  <path d="M340,495 L320,510" stroke="#000" stroke-width="1.5" stroke-dasharray="2,2"/>
  <path d="M340,495 L360,510" stroke="#000" stroke-width="1.5" stroke-dasharray="2,2"/>
  <path d="M340,495 L340,512" stroke="#000" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- Title area at top -->
  <rect x="420" y="30" width="360" height="60" fill="#000" stroke="#000" stroke-width="3"/>
  <text x="600" y="55" font-family="serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">Module 07</text>
  <text x="600" y="78" font-family="serif" font-size="16" fill="#fff" text-anchor="middle">Acute Abdominal Pain 急性腹痛</text>

  <!-- Corner decorations - woodcut style -->
  <path d="M20,20 L45,20 L45,22 L22,22 L22,45 L20,45 Z" fill="#000"/>
  <path d="M780,20 L755,20 L755,22 L778,22 L778,45 L780,45 Z" fill="#000"/>
  <path d="M20,580 L45,580 L45,578 L22,578 L22,555 L20,555 Z" fill="#000"/>
  <path d="M780,580 L755,580 L755,578 L778,578 L778,555 L780,555 Z" fill="#000"/>

  <!-- Decorative hatching in background corners -->
  <path d="M420,100 L780,100" stroke="#000" stroke-width="0.5"/>
  <path d="M420,105 L780,105" stroke="#000" stroke-width="0.3"/>
  <path d="M450,110 L780,110" stroke="#000" stroke-width="0.5"/>
  <path d="M480,115 L780,115" stroke="#000" stroke-width="0.3"/>

  <!-- Label: RUQ -->
  <text x="340" y="440" font-family="serif" font-size="11" fill="#000" text-anchor="middle" font-style="italic">RUQ</text>

  <!-- Additional woodcut texture lines on bed -->
  <line x1="60" y1="530" x2="740" y2="530" stroke="#000" stroke-width="0.8"/>
  <line x1="60" y1="540" x2="740" y2="540" stroke="#000" stroke-width="0.5"/>
  <line x1="60" y1="550" x2="740" y2="550" stroke="#000" stroke-width="0.8"/>

  <!-- Blanket/drape over lower body -->
  <path d="M480,480 L520,475 L620,478 L720,485 L720,515 L480,515 Z" fill="url(#hatch-light)" stroke="#000" stroke-width="2"/>
  <!-- Drape fold lines -->
  <path d="M500,485 Q540,478 560,485" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M580,482 Q620,476 660,484" fill="none" stroke="#000" stroke-width="1.5"/>
</svg>