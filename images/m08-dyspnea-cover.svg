<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <title>Module 08: Dyspnea - Cover</title>
  <defs>
    <pattern id="hatch-light" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <pattern id="hatch-medium" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#000" stroke-width="1"/>
    </pattern>
    <pattern id="cross-hatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="4" stroke="#000" stroke-width="0.6"/>
      <line x1="4" y1="0" x2="0" y2="4" stroke="#000" stroke-width="0.6"/>
    </pattern>
    <pattern id="cross-hatch-dense" patternUnits="userSpaceOnUse" width="3" height="3">
      <line x1="0" y1="0" x2="3" y2="3" stroke="#000" stroke-width="0.7"/>
      <line x1="3" y1="0" x2="0" y2="3" stroke="#000" stroke-width="0.7"/>
    </pattern>
    <pattern id="stipple" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="1" cy="1" r="0.5" fill="#000"/>
      <circle cx="4" cy="4" r="0.5" fill="#000"/>
    </pattern>
    <pattern id="horizontal-lines" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="2" x2="4" y2="2" stroke="#000" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#fff"/>

  <!-- Border -->
  <rect x="6" y="6" width="788" height="588" fill="none" stroke="#000" stroke-width="5"/>
  <rect x="12" y="12" width="776" height="576" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Title -->
  <rect x="440" y="22" width="340" height="55" fill="#000"/>
  <text x="610" y="46" font-family="serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">Module 08</text>
  <text x="610" y="66" font-family="serif" font-size="15" fill="#fff" text-anchor="middle">Dyspnea 呼吸困難</text>

  <!-- Patient seated, viewed from behind -->
  <!-- Patient head (from back) -->
  <ellipse cx="350" cy="140" rx="42" ry="48" fill="#fff" stroke="#000" stroke-width="4"/>
  <!-- Hair -->
  <path d="M310,130 Q315,90 350,82 Q385,90 390,130" fill="url(#cross-hatch-dense)" stroke="#000" stroke-width="3"/>
  <!-- Ear left -->
  <path d="M308,135 Q300,130 298,140 Q298,150 305,148" fill="#fff" stroke="#000" stroke-width="2.5"/>
  <!-- Ear right -->
  <path d="M392,135 Q400,130 402,140 Q402,150 395,148" fill="#fff" stroke="#000" stroke-width="2.5"/>

  <!-- Neck (back view) -->
  <path d="M330,185 L330,210 L370,210 L370,185" fill="#fff" stroke="#000" stroke-width="3"/>
  <!-- Neck vertebrae bumps -->
  <circle cx="350" cy="195" r="4" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="350" cy="208" r="3" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Back / thorax (posterior view) -->
  <path d="M240,210 L250,200 L330,210 L370,210 L450,200 L460,210 L470,350 L465,480 L455,520 L350,530 L245,520 L235,480 L230,350 Z" fill="#fff" stroke="#000" stroke-width="4"/>

  <!-- Spine line down the back -->
  <line x1="350" y1="210" x2="350" y2="520" stroke="#000" stroke-width="3"/>
  <!-- Vertebrae markings -->
  <ellipse cx="350" cy="230" rx="8" ry="5" fill="none" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="350" cy="255" rx="8" ry="5" fill="none" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="350" cy="280" rx="8" ry="5" fill="none" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="350" cy="305" rx="8" ry="5" fill="none" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="350" cy="330" rx="8" ry="5" fill="none" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="350" cy="355" rx="8" ry="5" fill="none" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="350" cy="380" rx="8" ry="5" fill="none" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="350" cy="405" rx="8" ry="5" fill="none" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="350" cy="430" rx="8" ry="5" fill="none" stroke="#000" stroke-width="1.5"/>
  <ellipse cx="350" cy="455" rx="8" ry="5" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Scapula outlines (left) -->
  <path d="M265,230 Q260,260 262,310 Q265,340 285,350 Q310,345 325,310 Q330,280 320,250 Q305,230 280,225 Z" fill="url(#hatch-light)" stroke="#000" stroke-width="2.5"/>
  <!-- Scapula spine -->
  <path d="M270,245 Q295,240 320,255" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Scapula (right) -->
  <path d="M435,230 Q440,260 438,310 Q435,340 415,350 Q390,345 375,310 Q370,280 380,250 Q395,230 420,225 Z" fill="url(#hatch-light)" stroke="#000" stroke-width="2.5"/>
  <path d="M430,245 Q405,240 380,255" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Rib outlines visible through back (posterior) -->
  <!-- Left ribs -->
  <path d="M260,260 Q290,270 340,265" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M255,285 Q290,295 340,290" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M250,310 Q290,322 340,315" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M248,340 Q290,352 340,342" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M248,370 Q290,380 340,370" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M250,400 Q290,410 340,398" fill="none" stroke="#000" stroke-width="1.5"/>
  <!-- Right ribs -->
  <path d="M440,260 Q410,270 360,265" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M445,285 Q410,295 360,290" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M450,310 Q410,322 360,315" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M452,340 Q410,352 360,342" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M452,370 Q410,380 360,370" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M450,400 Q410,410 360,398" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Zone scan probe positions (lawnmower approach) -->
  <!-- Zone markers on LEFT posterior chest -->
  <!-- Upper zone -->
  <rect x="270" y="248" width="22" height="12" rx="3" fill="#000" stroke="#000" stroke-width="2"/>
  <line x1="281" y1="242" x2="281" y2="248" stroke="#000" stroke-width="2"/>

  <!-- Middle zone -->
  <rect x="260" y="318" width="22" height="12" rx="3" fill="#000" stroke="#000" stroke-width="2"/>
  <line x1="271" y1="312" x2="271" y2="318" stroke="#000" stroke-width="2"/>

  <!-- Lower zone -->
  <rect x="258" y="388" width="22" height="12" rx="3" fill="#000" stroke="#000" stroke-width="2"/>
  <line x1="269" y1="382" x2="269" y2="388" stroke="#000" stroke-width="2"/>

  <!-- Zone markers on RIGHT posterior chest -->
  <!-- Upper zone -->
  <rect x="408" y="248" width="22" height="12" rx="3" fill="#000" stroke="#000" stroke-width="2"/>
  <line x1="419" y1="242" x2="419" y2="248" stroke="#000" stroke-width="2"/>

  <!-- Middle zone -->
  <rect x="418" y="318" width="22" height="12" rx="3" fill="#000" stroke="#000" stroke-width="2"/>
  <line x1="429" y1="312" x2="429" y2="318" stroke="#000" stroke-width="2"/>

  <!-- Lower zone -->
  <rect x="420" y="388" width="22" height="12" rx="3" fill="#000" stroke="#000" stroke-width="2"/>
  <line x1="431" y1="382" x2="431" y2="388" stroke="#000" stroke-width="2"/>

  <!-- Arrows showing lawnmower scan pattern (right side) -->
  <path d="M442,254 L455,254 L455,324 L442,324" fill="none" stroke="#000" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M455,324 L468,324 L468,394 L455,394" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Arrow heads manually -->
  <polygon points="442,324 448,320 448,328" fill="#000"/>
  <polygon points="455,394 461,390 461,398" fill="#000"/>

  <!-- Doctor figure (behind patient, reaching with probe) -->
  <!-- Doctor is to the right side -->
  <!-- Doctor body -->
  <path d="M560,180 L530,180 Q515,185 510,210 L505,340 L515,345 L520,220 L530,200 L560,195 L590,200 L600,220 L605,345 L615,340 L610,210 Q605,185 590,180 Z" fill="#fff" stroke="#000" stroke-width="3.5"/>
  <!-- Coat lapels -->
  <path d="M540,185 L548,210 L555,240 L555,340" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M580,185 L572,210 L565,240 L565,340" fill="none" stroke="#000" stroke-width="1.5"/>
  <!-- Buttons -->
  <circle cx="560" cy="230" r="2.5" fill="#000"/>
  <circle cx="560" cy="255" r="2.5" fill="#000"/>
  <circle cx="560" cy="280" r="2.5" fill="#000"/>

  <!-- Doctor head -->
  <ellipse cx="560" cy="142" rx="32" ry="40" fill="#fff" stroke="#000" stroke-width="3.5"/>
  <!-- Hair -->
  <path d="M530,130 Q535,105 560,98 Q585,105 590,130" fill="url(#cross-hatch-dense)" stroke="#000" stroke-width="2.5"/>
  <!-- Eye -->
  <ellipse cx="548" cy="140" rx="4" ry="2.5" fill="#000"/>
  <!-- Nose -->
  <path d="M555,145 L552,152 L556,154" fill="none" stroke="#000" stroke-width="1.5"/>
  <!-- Mouth -->
  <line x1="548" y1="160" x2="558" y2="158" stroke="#000" stroke-width="1.5"/>
  <!-- Glasses -->
  <circle cx="548" cy="139" r="8" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="568" cy="139" r="8" fill="none" stroke="#000" stroke-width="1.5"/>
  <line x1="556" y1="139" x2="560" y2="139" stroke="#000" stroke-width="1.5"/>

  <!-- Doctor right arm reaching to patient back with probe -->
  <path d="M530,200 Q500,230 480,270 Q460,310 445,340 Q438,360 435,390" fill="none" stroke="#000" stroke-width="4"/>
  <!-- Hand -->
  <path d="M428,385 Q425,390 428,398 Q432,405 438,402 L445,395 Q448,390 443,385 Z" fill="#fff" stroke="#000" stroke-width="2.5"/>

  <!-- Probe in hand on patient back -->
  <rect x="427" y="398" width="14" height="20" rx="3" fill="#000" stroke="#000" stroke-width="2"/>

  <!-- Doctor left arm -->
  <path d="M590,200 Q610,240 615,280 Q618,310 616,330" fill="none" stroke="#000" stroke-width="3.5"/>

  <!-- Ultrasound findings emanating from probe zones -->
  <!-- A-lines pattern from upper zone (normal) -->
  <g transform="translate(0,0)" opacity="0.9">
    <!-- Small sector from upper left probe -->
    <path d="M281,260 L265,290 L297,290 Z" fill="#000" stroke="#fff" stroke-width="1"/>
    <!-- A-lines (horizontal) -->
    <line x1="270" y1="272" x2="292" y2="272" stroke="#fff" stroke-width="1"/>
    <line x1="268" y1="280" x2="294" y2="280" stroke="#fff" stroke-width="0.8"/>
    <line x1="266" y1="288" x2="296" y2="288" stroke="#fff" stroke-width="0.6"/>
    <text x="281" y="302" font-family="monospace" font-size="7" fill="#000" text-anchor="middle">A-lines</text>
  </g>

  <!-- B-lines pattern from lower zone -->
  <g transform="translate(0,0)" opacity="0.9">
    <path d="M269,400 L253,435 L285,435 Z" fill="#000" stroke="#fff" stroke-width="1"/>
    <!-- B-lines (vertical bright lines) -->
    <line x1="262" y1="410" x2="258" y2="433" stroke="#fff" stroke-width="1.5"/>
    <line x1="269" y1="405" x2="267" y2="433" stroke="#fff" stroke-width="1.5"/>
    <line x1="276" y1="408" x2="274" y2="433" stroke="#fff" stroke-width="1.5"/>
    <line x1="280" y1="410" x2="280" y2="433" stroke="#fff" stroke-width="1"/>
    <text x="269" y="447" font-family="monospace" font-size="7" fill="#000" text-anchor="middle">B-lines</text>
  </g>

  <!-- Pleural line detail inset (bottom right) -->
  <rect x="600" y="380" width="180" height="190" fill="#fff" stroke="#000" stroke-width="3"/>
  <rect x="606" y="386" width="168" height="25" fill="#000"/>
  <text x="690" y="403" font-family="serif" font-size="11" fill="#fff" text-anchor="middle">Pleural Line Detail</text>

  <!-- Rib-Pleura diagram -->
  <!-- Two ribs with pleural line between -->
  <!-- Left rib -->
  <ellipse cx="640" cy="440" rx="20" ry="12" fill="url(#cross-hatch)" stroke="#000" stroke-width="2.5"/>
  <path d="M640,452 L640,470" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Rib shadow -->
  <path d="M625,452 L620,550 L660,550 L655,452" fill="url(#hatch-medium)" stroke="none"/>

  <!-- Right rib -->
  <ellipse cx="740" cy="440" rx="20" ry="12" fill="url(#cross-hatch)" stroke="#000" stroke-width="2.5"/>
  <path d="M740,452 L740,470" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Rib shadow -->
  <path d="M725,452 L720,550 L760,550 L755,452" fill="url(#hatch-medium)" stroke="none"/>

  <!-- Pleural line (bright line between ribs) -->
  <line x1="655" y1="450" x2="725" y2="450" stroke="#000" stroke-width="3.5"/>
  <text x="690" y="465" font-family="monospace" font-size="8" fill="#000" text-anchor="middle">Pleural Line</text>

  <!-- A-lines below pleural line -->
  <line x1="660" y1="475" x2="720" y2="475" stroke="#000" stroke-width="2"/>
  <text x="750" y="478" font-family="monospace" font-size="7" fill="#000">A-line</text>
  <line x1="662" y1="500" x2="718" y2="500" stroke="#000" stroke-width="1.5"/>
  <text x="750" y="503" font-family="monospace" font-size="7" fill="#000">A-line</text>
  <line x1="664" y1="525" x2="716" y2="525" stroke="#000" stroke-width="1"/>

  <!-- B-line example -->
  <line x1="690" y1="450" x2="690" y2="555" stroke="#000" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="690" y="565" font-family="monospace" font-size="7" fill="#000" text-anchor="middle">B-line</text>

  <!-- Labels on ribs -->
  <text x="640" y="443" font-family="serif" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">Rib</text>
  <text x="740" y="443" font-family="serif" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">Rib</text>

  <!-- Sitting surface for patient -->
  <path d="M200,520 L500,520 L510,560 L190,560 Z" fill="url(#hatch-light)" stroke="#000" stroke-width="3"/>

  <!-- Corner woodcut decorations -->
  <path d="M18,18 L48,18 L48,20 L20,20 L20,48 L18,48 Z" fill="#000"/>
  <path d="M782,18 L752,18 L752,20 L780,20 L780,48 L782,48 Z" fill="#000"/>
  <path d="M18,582 L48,582 L48,580 L20,580 L20,552 L18,552 Z" fill="#000"/>
  <path d="M782,582 L752,582 L752,580 L780,580 L780,552 L782,552 Z" fill="#000"/>

  <!-- Zone labels on patient back -->
  <text x="230" y="260" font-family="serif" font-size="9" fill="#000" font-weight="bold">Upper</text>
  <text x="222" y="330" font-family="serif" font-size="9" fill="#000" font-weight="bold">Middle</text>
  <text x="225" y="400" font-family="serif" font-size="9" fill="#000" font-weight="bold">Lower</text>

  <!-- Subtitle -->
  <text x="140" y="100" font-family="serif" font-size="12" fill="#000" font-style="italic">Lung Ultrasound</text>
  <text x="140" y="116" font-family="serif" font-size="12" fill="#000" font-style="italic">Zone Scanning</text>
  <text x="140" y="132" font-family="serif" font-size="11" fill="#000">肺部超音波分區掃描</text>
</svg>