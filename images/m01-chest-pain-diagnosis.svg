<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="1"/>
      <line x1="0" y1="0" x2="6" y2="0" stroke="#000" stroke-width="1"/>
    </pattern>
    <pattern id="hatch-dense" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#000" stroke-width="1"/>
    </pattern>
    <pattern id="hatch-light" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <pattern id="hatch-horiz" width="5" height="5" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2.5" x2="5" y2="2.5" stroke="#000" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#fff"/>

  <!-- Outer border -->
  <rect x="5" y="5" width="790" height="590" fill="none" stroke="#000" stroke-width="5"/>

  <!-- Title bar -->
  <rect x="5" y="5" width="790" height="55" fill="#000"/>
  <text x="400" y="40" font-family="serif" font-size="22" fill="#fff" text-anchor="middle" font-weight="bold">胸痛鑑別診斷 — Chest Pain Differential Diagnosis</text>

  <!-- Three panels -->
  <!-- Panel 1: Pericardial Effusion -->
  <rect x="20" y="75" width="245" height="505" fill="#fff" stroke="#000" stroke-width="4"/>
  <!-- Panel header -->
  <rect x="20" y="75" width="245" height="40" fill="#000"/>
  <text x="142" y="102" font-family="serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">心包積液</text>

  <!-- Probe icon -->
  <rect x="125" y="125" width="16" height="35" rx="3" fill="#000"/>
  <rect x="128" y="158" width="10" height="6" rx="2" fill="#000"/>
  <!-- Ultrasound waves from probe -->
  <path d="M133,165 C140,172 140,172 133,180" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M133,165 C125,172 125,172 133,180" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Heart with pericardial effusion -->
  <!-- Pericardium (outer) -->
  <ellipse cx="142" cy="330" rx="95" ry="105" fill="url(#hatch-light)" stroke="#000" stroke-width="4"/>
  <!-- Fluid space (dark ring) -->
  <ellipse cx="142" cy="330" rx="75" ry="85" fill="#000" stroke="#000" stroke-width="2"/>
  <!-- Heart (inner) -->
  <path d="M142,270 C142,255 122,240 112,255 C102,240 82,255 82,270 C82,300 112,325 142,350 C172,325 202,300 202,270 C202,255 182,240 172,255 C162,240 142,255 142,270Z" fill="#fff" stroke="#fff" stroke-width="3"/>
  <!-- Heart chambers -->
  <line x1="142" y1="275" x2="142" y2="345" stroke="#000" stroke-width="2"/>
  <line x1="100" y1="305" x2="184" y2="305" stroke="#000" stroke-width="2"/>
  <!-- Chamber labels -->
  <text x="120" y="295" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle">RV</text>
  <text x="164" y="295" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle">LV</text>
  <text x="120" y="325" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle">RA</text>
  <text x="164" y="325" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle">LA</text>

  <!-- Arrows pointing to effusion -->
  <line x1="55" y1="260" x2="72" y2="280" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="230" y1="260" x2="212" y2="280" stroke="#000" stroke-width="2"/>
  <!-- Arrow tips -->
  <polygon points="72,280 65,273 68,282" fill="#000"/>
  <polygon points="212,280 219,273 216,282" fill="#000"/>
  <text x="55" y="255" font-family="sans-serif" font-size="11" fill="#000" text-anchor="middle">Effusion</text>
  <text x="225" y="255" font-family="sans-serif" font-size="11" fill="#000" text-anchor="middle">積液</text>

  <!-- Label -->
  <rect x="40" y="460" width="205" height="35" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="142" y="483" font-family="serif" font-size="14" fill="#000" text-anchor="middle" font-weight="bold">Pericardial Effusion</text>
  <!-- Hatching around heart for emphasis -->
  <path d="M50,400 L60,410" stroke="#000" stroke-width="1"/>
  <path d="M55,395 L65,405" stroke="#000" stroke-width="1"/>
  <path d="M225,400 L215,410" stroke="#000" stroke-width="1"/>
  <path d="M220,395 L210,405" stroke="#000" stroke-width="1"/>

  <!-- Panel 2: Aortic Dissection -->
  <rect x="278" y="75" width="245" height="505" fill="#fff" stroke="#000" stroke-width="4"/>
  <rect x="278" y="75" width="245" height="40" fill="#000"/>
  <text x="400" y="102" font-family="serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">主動脈剝離</text>

  <!-- Probe icon -->
  <rect x="383" y="125" width="16" height="35" rx="3" fill="#000"/>
  <rect x="386" y="158" width="10" height="6" rx="2" fill="#000"/>
  <path d="M391,165 C398,172 398,172 391,180" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M391,165 C383,172 383,172 391,180" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Aorta cross-section (large) -->
  <circle cx="400" cy="300" r="90" fill="#fff" stroke="#000" stroke-width="5"/>
  <!-- Aortic wall thickness -->
  <circle cx="400" cy="300" r="80" fill="url(#hatch-horiz)" stroke="#000" stroke-width="2"/>
  <circle cx="400" cy="300" r="70" fill="#fff" stroke="#000" stroke-width="2"/>

  <!-- Intimal flap -->
  <path d="M340,260 C360,280 380,320 400,370" fill="none" stroke="#000" stroke-width="4"/>
  <!-- Flap waviness -->
  <path d="M340,260 C350,270 355,275 360,280 C365,285 368,295 372,305 C376,315 382,330 390,345 C395,355 398,362 400,370" fill="none" stroke="#000" stroke-width="3"/>

  <!-- True lumen label -->
  <text x="430" y="295" font-family="sans-serif" font-size="11" fill="#000" text-anchor="middle">True</text>
  <text x="430" y="310" font-family="sans-serif" font-size="11" fill="#000" text-anchor="middle">Lumen</text>
  <!-- False lumen with hatching -->
  <path d="M340,260 C330,270 325,285 330,300 C335,320 340,340 350,360 C360,375 380,380 400,370" fill="url(#hatch-dense)" stroke="none"/>
  <text x="355" y="310" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle">False</text>
  <text x="355" y="323" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle">Lumen</text>

  <!-- Tear indicator arrow -->
  <line x1="310" y1="240" x2="335" y2="258" stroke="#000" stroke-width="2"/>
  <polygon points="335,258 326,254 330,261" fill="#000"/>
  <text x="305" y="235" font-family="sans-serif" font-size="11" fill="#000" text-anchor="middle">Intimal</text>
  <text x="305" y="248" font-family="sans-serif" font-size="11" fill="#000" text-anchor="middle">Flap</text>

  <!-- Longitudinal view below -->
  <rect x="305" y="405" width="190" height="75" fill="#fff" stroke="#000" stroke-width="3"/>
  <!-- Aorta tube -->
  <line x1="310" y1="425" x2="490" y2="425" stroke="#000" stroke-width="3"/>
  <line x1="310" y1="465" x2="490" y2="465" stroke="#000" stroke-width="3"/>
  <!-- Intimal flap longitudinal -->
  <path d="M370,425 C380,435 390,445 400,445 C410,445 420,440 430,435 C440,430 450,428 460,425" fill="none" stroke="#000" stroke-width="3"/>
  <text x="400" y="458" font-family="sans-serif" font-size="9" fill="#000" text-anchor="middle">Flap (longitudinal)</text>

  <!-- Label -->
  <rect x="298" y="500" width="205" height="35" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="400" y="523" font-family="serif" font-size="14" fill="#000" text-anchor="middle" font-weight="bold">Aortic Dissection</text>

  <!-- Panel 3: Pneumothorax -->
  <rect x="536" y="75" width="245" height="505" fill="#fff" stroke="#000" stroke-width="4"/>
  <rect x="536" y="75" width="245" height="40" fill="#000"/>
  <text x="658" y="102" font-family="serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">氣胸</text>

  <!-- Probe icon -->
  <rect x="641" y="125" width="16" height="35" rx="3" fill="#000"/>
  <rect x="644" y="158" width="10" height="6" rx="2" fill="#000"/>
  <path d="M649,165 C656,172 656,172 649,180" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M649,165 C641,172 641,172 649,180" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Normal lung sliding (top) -->
  <rect x="560" y="190" width="195" height="90" fill="#fff" stroke="#000" stroke-width="3"/>
  <text x="658" y="208" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle">Normal: Seashore Sign</text>
  <!-- Pleural line -->
  <line x1="565" y1="230" x2="750" y2="230" stroke="#000" stroke-width="2"/>
  <!-- Above: horizontal lines (seashore-waves) -->
  <line x1="565" y1="215" x2="750" y2="215" stroke="#000" stroke-width="1"/>
  <line x1="565" y1="222" x2="750" y2="222" stroke="#000" stroke-width="1"/>
  <!-- Below: granular/sandy pattern -->
  <line x1="570" y1="235" x2="575" y2="240" stroke="#000" stroke-width="0.8"/>
  <line x1="580" y1="238" x2="585" y2="233" stroke="#000" stroke-width="0.8"/>
  <line x1="590" y1="235" x2="595" y2="242" stroke="#000" stroke-width="0.8"/>
  <line x1="600" y1="240" x2="605" y2="234" stroke="#000" stroke-width="0.8"/>
  <line x1="610" y1="236" x2="615" y2="241" stroke="#000" stroke-width="0.8"/>
  <line x1="620" y1="239" x2="625" y2="233" stroke="#000" stroke-width="0.8"/>
  <line x1="630" y1="234" x2="635" y2="240" stroke="#000" stroke-width="0.8"/>
  <line x1="640" y1="241" x2="645" y2="235" stroke="#000" stroke-width="0.8"/>
  <line x1="650" y1="236" x2="655" y2="242" stroke="#000" stroke-width="0.8"/>
  <line x1="660" y1="238" x2="665" y2="233" stroke="#000" stroke-width="0.8"/>
  <line x1="670" y1="235" x2="675" y2="241" stroke="#000" stroke-width="0.8"/>
  <line x1="680" y1="240" x2="685" y2="234" stroke="#000" stroke-width="0.8"/>
  <line x1="690" y1="237" x2="695" y2="243" stroke="#000" stroke-width="0.8"/>
  <line x1="700" y1="234" x2="705" y2="240" stroke="#000" stroke-width="0.8"/>
  <line x1="710" y1="241" x2="715" y2="236" stroke="#000" stroke-width="0.8"/>
  <line x1="720" y1="238" x2="725" y2="243" stroke="#000" stroke-width="0.8"/>
  <line x1="730" y1="235" x2="735" y2="241" stroke="#000" stroke-width="0.8"/>
  <line x1="740" y1="240" x2="745" y2="234" stroke="#000" stroke-width="0.8"/>
  <!-- More dots for granular -->
  <circle cx="575" cy="250" r="1" fill="#000"/>
  <circle cx="585" cy="248" r="1" fill="#000"/>
  <circle cx="595" cy="252" r="1" fill="#000"/>
  <circle cx="605" cy="249" r="1" fill="#000"/>
  <circle cx="615" cy="253" r="1" fill="#000"/>
  <circle cx="625" cy="247" r="1" fill="#000"/>
  <circle cx="635" cy="251" r="1" fill="#000"/>
  <circle cx="645" cy="248" r="1" fill="#000"/>
  <circle cx="655" cy="253" r="1" fill="#000"/>
  <circle cx="665" cy="249" r="1" fill="#000"/>
  <circle cx="675" cy="252" r="1" fill="#000"/>
  <circle cx="685" cy="248" r="1" fill="#000"/>
  <circle cx="695" cy="251" r="1" fill="#000"/>
  <circle cx="705" cy="249" r="1" fill="#000"/>
  <circle cx="715" cy="253" r="1" fill="#000"/>
  <circle cx="725" cy="248" r="1" fill="#000"/>
  <circle cx="735" cy="252" r="1" fill="#000"/>
  <circle cx="745" cy="249" r="1" fill="#000"/>
  <!-- More row -->
  <circle cx="570" cy="260" r="1" fill="#000"/>
  <circle cx="580" cy="262" r="1" fill="#000"/>
  <circle cx="590" cy="258" r="1" fill="#000"/>
  <circle cx="600" cy="263" r="1" fill="#000"/>
  <circle cx="610" cy="259" r="1" fill="#000"/>
  <circle cx="620" cy="264" r="1" fill="#000"/>
  <circle cx="630" cy="260" r="1" fill="#000"/>
  <circle cx="640" cy="265" r="1" fill="#000"/>
  <circle cx="650" cy="258" r="1" fill="#000"/>
  <circle cx="660" cy="263" r="1" fill="#000"/>
  <circle cx="670" cy="260" r="1" fill="#000"/>
  <circle cx="680" cy="264" r="1" fill="#000"/>
  <circle cx="690" cy="259" r="1" fill="#000"/>
  <circle cx="700" cy="263" r="1" fill="#000"/>
  <circle cx="710" cy="258" r="1" fill="#000"/>
  <circle cx="720" cy="262" r="1" fill="#000"/>
  <circle cx="730" cy="259" r="1" fill="#000"/>
  <circle cx="740" cy="264" r="1" fill="#000"/>
  <text x="658" y="277" font-family="sans-serif" font-size="9" fill="#000" text-anchor="middle">✓ Lung Sliding Present</text>

  <!-- Pneumothorax: Barcode/Stratosphere sign -->
  <rect x="560" y="310" width="195" height="120" fill="#fff" stroke="#000" stroke-width="3"/>
  <text x="658" y="328" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle" font-weight="bold">PTX: Barcode Sign</text>
  <!-- Pleural line -->
  <line x1="565" y1="350" x2="750" y2="350" stroke="#000" stroke-width="2.5"/>
  <!-- All horizontal lines (no granular = stratosphere) -->
  <line x1="565" y1="335" x2="750" y2="335" stroke="#000" stroke-width="1"/>
  <line x1="565" y1="342" x2="750" y2="342" stroke="#000" stroke-width="1"/>
  <line x1="565" y1="358" x2="750" y2="358" stroke="#000" stroke-width="1"/>
  <line x1="565" y1="366" x2="750" y2="366" stroke="#000" stroke-width="1"/>
  <line x1="565" y1="374" x2="750" y2="374" stroke="#000" stroke-width="1"/>
  <line x1="565" y1="382" x2="750" y2="382" stroke="#000" stroke-width="1"/>
  <line x1="565" y1="390" x2="750" y2="390" stroke="#000" stroke-width="1"/>
  <line x1="565" y1="398" x2="750" y2="398" stroke="#000" stroke-width="1"/>
  <line x1="565" y1="406" x2="750" y2="406" stroke="#000" stroke-width="1"/>
  <line x1="565" y1="414" x2="750" y2="414" stroke="#000" stroke-width="1"/>
  <line x1="565" y1="422" x2="750" y2="422" stroke="#000" stroke-width="1"/>
  <text x="658" y="430" font-family="sans-serif" font-size="9" fill="#000" text-anchor="middle">✗ No Lung Sliding = PTX</text>

  <!-- Absent lung point diagram -->
  <rect x="560" y="445" width="195" height="50" fill="url(#crosshatch)" stroke="#000" stroke-width="2" opacity="0.3"/>
  <text x="658" y="475" font-family="sans-serif" font-size="11" fill="#000" text-anchor="middle" font-weight="bold">Absent Lung Sliding</text>

  <!-- Label -->
  <rect x="556" y="500" width="205" height="35" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="658" y="523" font-family="serif" font-size="14" fill="#000" text-anchor="middle" font-weight="bold">Pneumothorax</text>

  <!-- Decorative corner elements -->
  <path d="M10,10 L35,10 L35,14 L14,14 L14,35 L10,35Z" fill="#000"/>
  <path d="M790,10 L765,10 L765,14 L786,14 L786,35 L790,35Z" fill="#000"/>
  <path d="M10,590 L35,590 L35,586 L14,586 L14,565 L10,565Z" fill="#000"/>
  <path d="M790,590 L765,590 L765,586 L786,586 L786,565 L790,565Z" fill="#000"/>
</svg>