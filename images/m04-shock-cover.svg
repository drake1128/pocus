<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="hatch1" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="1.5"/>
    </pattern>
    <pattern id="crosshatch1" patternUnits="userSpaceOnUse" width="6" height="6">
      <line x1="0" y1="0" x2="6" y2="6" stroke="#000" stroke-width="1"/>
      <line x1="6" y1="0" x2="0" y2="6" stroke="#000" stroke-width="1"/>
    </pattern>
    <pattern id="hatch2" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#000" stroke-width="1"/>
    </pattern>
    <pattern id="densehatch" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#000" stroke-width="1.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#fff"/>

  <!-- Border frame -->
  <rect x="10" y="10" width="780" height="580" fill="none" stroke="#000" stroke-width="4"/>
  <rect x="16" y="16" width="768" height="568" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- RUSH Title -->
  <text x="400" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#000" letter-spacing="12">RUSH</text>
  <text x="400" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#000" letter-spacing="4">RAPID ULTRASOUND IN SHOCK &amp; HYPOTENSION</text>
  <line x1="120" y1="100" x2="680" y2="100" stroke="#000" stroke-width="3"/>

  <!-- Patient body - supine on table -->
  <!-- Table/bed -->
  <rect x="130" y="430" width="540" height="12" fill="url(#hatch2)" stroke="#000" stroke-width="3"/>
  <line x1="150" y1="442" x2="150" y2="480" stroke="#000" stroke-width="4"/>
  <line x1="650" y1="442" x2="650" y2="480" stroke="#000" stroke-width="4"/>
  <line x1="140" y1="480" x2="160" y2="480" stroke="#000" stroke-width="3"/>
  <line x1="640" y1="480" x2="660" y2="480" stroke="#000" stroke-width="3"/>

  <!-- Patient torso -->
  <ellipse cx="400" cy="340" rx="120" ry="85" fill="#fff" stroke="#000" stroke-width="3.5"/>
  <!-- Body hatching -->
  <ellipse cx="400" cy="340" rx="115" ry="80" fill="url(#hatch1)" stroke="none" opacity="0.3"/>

  <!-- Head -->
  <ellipse cx="590" cy="330" rx="40" ry="48" fill="#fff" stroke="#000" stroke-width="3.5"/>
  <ellipse cx="590" cy="330" rx="35" ry="43" fill="url(#hatch2)" stroke="none" opacity="0.25"/>
  <!-- Closed eyes -->
  <line x1="575" y1="322" x2="585" y2="322" stroke="#000" stroke-width="2.5"/>
  <line x1="598" y1="322" x2="608" y2="322" stroke="#000" stroke-width="2.5"/>
  <!-- Neck -->
  <rect x="545" y="315" width="20" height="30" fill="#fff" stroke="#000" stroke-width="2.5"/>

  <!-- Legs -->
  <path d="M280,390 L240,430 L200,430" fill="none" stroke="#000" stroke-width="3.5"/>
  <path d="M320,400 L280,430 L240,430" fill="none" stroke="#000" stroke-width="3.5"/>
  <!-- Feet -->
  <ellipse cx="195" cy="430" rx="18" ry="8" fill="#fff" stroke="#000" stroke-width="2.5"/>
  <ellipse cx="235" cy="430" rx="18" ry="8" fill="#fff" stroke="#000" stroke-width="2.5"/>

  <!-- Arms -->
  <path d="M480,390 L510,420" fill="none" stroke="#000" stroke-width="3"/>
  <path d="M320,390 L290,420" fill="none" stroke="#000" stroke-width="3"/>

  <!-- === ZONE 1: PUMP (Heart) === -->
  <!-- Heart icon -->
  <g transform="translate(420, 180)">
    <rect x="-55" y="-30" width="110" height="75" rx="8" fill="#fff" stroke="#000" stroke-width="3.5"/>
    <rect x="-50" y="-25" width="100" height="65" fill="url(#crosshatch1)" stroke="none" opacity="0.15"/>
    <!-- Heart shape -->
    <path d="M0,30 C-5,20 -25,0 -30,-10 C-35,-20 -25,-30 -15,-25 C-8,-22 -2,-10 0,-5 C2,-10 8,-22 15,-25 C25,-30 35,-20 30,-10 C25,0 5,20 0,30Z" fill="#000" stroke="#000" stroke-width="2"/>
    <text x="0" y="-38" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#000">PUMP</text>
    <text x="0" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#000">心臟</text>
  </g>

  <!-- Connection line from PUMP to chest -->
  <line x1="420" y1="255" x2="410" y2="300" stroke="#000" stroke-width="3" stroke-dasharray="8,4"/>
  <circle cx="410" cy="300" r="6" fill="#000"/>

  <!-- === ZONE 2: TANK (IVC/Lungs) === -->
  <g transform="translate(180, 180)">
    <rect x="-55" y="-30" width="110" height="75" rx="8" fill="#fff" stroke="#000" stroke-width="3.5"/>
    <rect x="-50" y="-25" width="100" height="65" fill="url(#crosshatch1)" stroke="none" opacity="0.15"/>
    <!-- Tank/cylinder icon -->
    <ellipse cx="0" cy="-5" rx="18" ry="7" fill="none" stroke="#000" stroke-width="2.5"/>
    <rect x="-18" y="-5" width="36" height="30" fill="#fff" stroke="#000" stroke-width="2.5"/>
    <line x1="-18" y1="-5" x2="-18" y2="25" stroke="#000" stroke-width="2.5"/>
    <line x1="18" y1="-5" x2="18" y2="25" stroke="#000" stroke-width="2.5"/>
    <ellipse cx="0" cy="25" rx="18" ry="7" fill="none" stroke="#000" stroke-width="2.5"/>
    <!-- Fill lines -->
    <line x1="-10" y1="5" x2="10" y2="5" stroke="#000" stroke-width="1.5"/>
    <line x1="-12" y1="10" x2="12" y2="10" stroke="#000" stroke-width="1.5"/>
    <line x1="-14" y1="15" x2="14" y2="15" stroke="#000" stroke-width="1.5"/>
    <line x1="-12" y1="20" x2="12" y2="20" stroke="#000" stroke-width="1.5"/>
    <text x="0" y="-38" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#000">TANK</text>
    <text x="0" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#000">IVC / 肺</text>
  </g>

  <!-- Connection line from TANK to body -->
  <line x1="180" y1="255" x2="350" y2="310" stroke="#000" stroke-width="3" stroke-dasharray="8,4"/>
  <circle cx="350" cy="310" r="6" fill="#000"/>

  <!-- === ZONE 3: PIPES (Aorta/Vessels) === -->
  <g transform="translate(630, 180)">
    <rect x="-55" y="-30" width="110" height="75" rx="8" fill="#fff" stroke="#000" stroke-width="3.5"/>
    <rect x="-50" y="-25" width="100" height="65" fill="url(#crosshatch1)" stroke="none" opacity="0.15"/>
    <!-- Pipe icon -->
    <path d="M-20,-10 L-20,20 C-20,28 -10,28 -10,20 L-10,-10" fill="none" stroke="#000" stroke-width="2.5"/>
    <path d="M-10,5 L10,5 L10,-10" fill="none" stroke="#000" stroke-width="2.5"/>
    <path d="M10,5 L10,20 C10,28 20,28 20,20 L20,-10" fill="none" stroke="#000" stroke-width="2.5"/>
    <!-- Arrow tips -->
    <polygon points="-15,18 -15,12 -20,15" fill="#000"/>
    <polygon points="15,18 15,12 20,15" fill="#000"/>
    <text x="0" y="-38" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#000">PIPES</text>
    <text x="0" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#000">主動脈 / 血管</text>
  </g>

  <!-- Connection line from PIPES to body -->
  <line x1="630" y1="255" x2="460" y2="320" stroke="#000" stroke-width="3" stroke-dasharray="8,4"/>
  <circle cx="460" cy="320" r="6" fill="#000"/>

  <!-- Ultrasound probe on patient chest -->
  <g transform="translate(390, 285) rotate(-15)">
    <!-- Probe body -->
    <rect x="-8" y="-40" width="16" height="35" rx="3" fill="#000" stroke="#000" stroke-width="2"/>
    <!-- Probe head -->
    <rect x="-10" y="-8" width="20" height="12" rx="2" fill="#fff" stroke="#000" stroke-width="2.5"/>
    <!-- Cable -->
    <path d="M0,-40 C-15,-55 -25,-65 -40,-70" fill="none" stroke="#000" stroke-width="2.5"/>
  </g>

  <!-- Ultrasound waves emanating from probe -->
  <path d="M385,290 C375,280 370,270 372,260" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="3,3"/>
  <path d="M390,288 C380,275 378,262 382,250" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="3,3"/>
  <path d="M395,286 C388,272 387,258 392,245" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Bottom label -->
  <rect x="200" y="500" width="400" height="50" rx="5" fill="#000"/>
  <text x="400" y="530" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#fff" letter-spacing="2">Module 04 - Shock Assessment</text>

  <!-- Decorative corner elements -->
  <path d="M20,20 L50,20 L50,25 L25,25 L25,50 L20,50Z" fill="#000"/>
  <path d="M780,20 L750,20 L750,25 L775,25 L775,50 L780,50Z" fill="#000"/>
  <path d="M20,580 L50,580 L50,575 L25,575 L25,550 L20,550Z" fill="#000"/>
  <path d="M780,580 L750,580 L750,575 L775,575 L775,550 L780,550Z" fill="#000"/>

  <!-- Subtitle under RUSH -->
  <text x="400" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#000" font-style="italic">Pump - Tank - Pipes</text>
</svg>