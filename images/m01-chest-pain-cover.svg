<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Cross-hatch pattern for shadows -->
    <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#000" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="8" y2="0" stroke="#000" stroke-width="1.5"/>
    </pattern>
    <pattern id="hatch-dense" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#000" stroke-width="1.2"/>
    </pattern>
    <pattern id="hatch-light" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#000" stroke-width="1"/>
    </pattern>
    <pattern id="hatch-horiz" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="3" x2="6" y2="3" stroke="#000" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#fff"/>

  <!-- Border frame -->
  <rect x="10" y="10" width="780" height="580" fill="none" stroke="#000" stroke-width="5"/>
  <rect x="16" y="16" width="768" height="568" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Ultrasound machine in background (right side) -->
  <!-- Machine body -->
  <rect x="520" y="40" width="240" height="320" rx="8" fill="#fff" stroke="#000" stroke-width="4"/>
  <rect x="520" y="40" width="240" height="30" fill="#000"/>
  <!-- Screen -->
  <rect x="535" y="85" width="210" height="160" fill="#000" stroke="#000" stroke-width="3"/>
  <!-- Heart silhouette on screen -->
  <path d="M600,130 C600,115 580,105 570,115 C560,105 540,115 540,130 C540,155 570,175 600,195 C630,175 660,155 660,130 C660,115 640,105 630,115 C620,105 600,115 600,130Z" fill="none" stroke="#fff" stroke-width="3"/>
  <!-- Scan lines on screen -->
  <line x1="540" y1="100" x2="540" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <line x1="560" y1="100" x2="560" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <line x1="580" y1="100" x2="580" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <line x1="600" y1="100" x2="600" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <line x1="620" y1="100" x2="620" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <line x1="640" y1="100" x2="640" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <line x1="660" y1="100" x2="660" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <line x1="680" y1="100" x2="680" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <line x1="700" y1="100" x2="700" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <line x1="720" y1="100" x2="720" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <line x1="740" y1="100" x2="740" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
  <!-- Machine controls -->
  <rect x="535" y="260" width="210" height="85" fill="url(#hatch-light)" stroke="#000" stroke-width="2"/>
  <circle cx="570" cy="290" r="10" fill="#fff" stroke="#000" stroke-width="3"/>
  <circle cx="610" cy="290" r="10" fill="#000" stroke="#000" stroke-width="3"/>
  <circle cx="650" cy="290" r="10" fill="#fff" stroke="#000" stroke-width="3"/>
  <rect x="555" y="310" width="120" height="25" rx="4" fill="#fff" stroke="#000" stroke-width="2"/>
  <!-- Machine stand shadow -->
  <rect x="610" y="360" width="60" height="80" fill="url(#crosshatch)" stroke="#000" stroke-width="3"/>

  <!-- Patient on bed -->
  <!-- Bed -->
  <rect x="30" y="400" width="520" height="30" fill="#fff" stroke="#000" stroke-width="4"/>
  <rect x="30" y="430" width="520" height="15" fill="url(#hatch-dense)"/>
  <rect x="30" y="445" width="520" height="5" fill="#000"/>
  <!-- Bed legs -->
  <rect x="50" y="450" width="15" height="120" fill="url(#crosshatch)" stroke="#000" stroke-width="3"/>
  <rect x="515" y="450" width="15" height="120" fill="url(#crosshatch)" stroke="#000" stroke-width="3"/>

  <!-- Patient body (lying supine) -->
  <!-- Torso -->
  <path d="M120,250 C120,250 130,400 130,400 L420,400 C420,400 430,250 430,250 C430,220 380,180 275,180 C170,180 120,220 120,250Z" fill="#fff" stroke="#000" stroke-width="4"/>
  <!-- Chest hatching for body contour -->
  <path d="M150,250 L150,380" stroke="#000" stroke-width="1" opacity="0.4"/>
  <path d="M180,230 L170,380" stroke="#000" stroke-width="1" opacity="0.4"/>
  <path d="M210,215 L195,385" stroke="#000" stroke-width="1" opacity="0.4"/>
  <path d="M340,215 L355,385" stroke="#000" stroke-width="1" opacity="0.4"/>
  <path d="M370,230 L380,380" stroke="#000" stroke-width="1" opacity="0.4"/>
  <path d="M400,250 L400,380" stroke="#000" stroke-width="1" opacity="0.4"/>

  <!-- Patient head (on pillow) -->
  <ellipse cx="95" cy="260" rx="55" ry="45" fill="#fff" stroke="#000" stroke-width="4"/>
  <!-- Face details -->
  <ellipse cx="80" cy="250" rx="5" ry="3" fill="#000"/>
  <line x1="75" y1="270" x2="90" y2="272" stroke="#000" stroke-width="2"/>
  <!-- Hair hatching -->
  <path d="M55,230 C55,210 70,200 95,200 C120,200 135,210 135,230" fill="none" stroke="#000" stroke-width="3"/>
  <line x1="60" y1="225" x2="65" y2="210" stroke="#000" stroke-width="1.5"/>
  <line x1="70" y1="220" x2="73" y2="205" stroke="#000" stroke-width="1.5"/>
  <line x1="80" y1="218" x2="82" y2="202" stroke="#000" stroke-width="1.5"/>
  <line x1="90" y1="217" x2="92" y2="201" stroke="#000" stroke-width="1.5"/>
  <line x1="100" y1="218" x2="102" y2="202" stroke="#000" stroke-width="1.5"/>
  <line x1="110" y1="220" x2="113" y2="205" stroke="#000" stroke-width="1.5"/>
  <line x1="120" y1="225" x2="125" y2="210" stroke="#000" stroke-width="1.5"/>
  <!-- Pillow -->
  <path d="M40,280 Q45,310 95,310 Q145,310 150,280 Q145,295 95,295 Q45,295 40,280Z" fill="#fff" stroke="#000" stroke-width="2"/>

  <!-- Doctor's hand holding probe (subcostal position) -->
  <!-- Arm -->
  <path d="M320,80 C340,100 350,150 340,200 C335,220 310,260 290,290" fill="none" stroke="#000" stroke-width="4"/>
  <!-- Second arm line for thickness -->
  <path d="M350,75 C370,95 380,145 370,195 C365,215 340,255 320,285" fill="none" stroke="#000" stroke-width="4"/>
  <!-- Hand -->
  <path d="M280,280 C275,290 285,310 300,315 C310,318 325,310 330,295 C335,280 325,270 310,270 C295,268 282,272 280,280Z" fill="#fff" stroke="#000" stroke-width="4"/>
  <!-- Fingers gripping probe -->
  <line x1="285" y1="295" x2="295" y2="310" stroke="#000" stroke-width="3"/>
  <line x1="290" y1="290" x2="305" y2="305" stroke="#000" stroke-width="3"/>
  <line x1="300" y1="285" x2="315" y2="300" stroke="#000" stroke-width="3"/>

  <!-- Ultrasound probe (subcostal) -->
  <rect x="290" y="310" width="30" height="60" rx="5" fill="#000" stroke="#000" stroke-width="3"/>
  <rect x="295" y="365" width="20" height="10" rx="3" fill="#fff" stroke="#000" stroke-width="2"/>
  <!-- Probe cable -->
  <path d="M305,310 C305,280 330,200 400,120 C440,80 480,60 520,70" fill="none" stroke="#000" stroke-width="3"/>

  <!-- Doctor's coat sleeve -->
  <path d="M300,70 L360,65 C375,62 385,70 380,85 L370,100 C365,110 350,108 340,100Z" fill="#fff" stroke="#000" stroke-width="3"/>
  <!-- Sleeve hatching -->
  <line x1="310" y1="72" x2="340" y2="100" stroke="#000" stroke-width="1"/>
  <line x1="325" y1="68" x2="355" y2="95" stroke="#000" stroke-width="1"/>
  <line x1="340" y1="66" x2="368" y2="92" stroke="#000" stroke-width="1"/>

  <!-- Subcostal area indicator - ultrasound waves -->
  <path d="M305,380 C315,390 325,390 335,380" fill="none" stroke="#000" stroke-width="2" opacity="0.6"/>
  <path d="M295,388 C310,402 330,402 345,388" fill="none" stroke="#000" stroke-width="2" opacity="0.4"/>
  <path d="M285,396 C305,414 335,414 355,396" fill="none" stroke="#000" stroke-width="2" opacity="0.3"/>

  <!-- Heart outline (central subtle element) -->
  <path d="M275,300 C275,280 255,265 240,280 C225,265 205,280 205,300 C205,330 240,355 275,380 C310,355 345,330 345,300 C345,280 325,265 310,280 C295,265 275,280 275,300Z" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Shadow beneath bed -->
  <path d="M25,455 L555,455 L555,575 L25,575Z" fill="url(#hatch-light)" opacity="0.3"/>

  <!-- Title area at bottom -->
  <rect x="200" y="530" width="400" height="45" fill="#000"/>
  <text x="400" y="560" font-family="serif" font-size="24" fill="#fff" text-anchor="middle" font-weight="bold">Module 01: Acute Chest Pain</text>

  <!-- Decorative corner elements (woodcut style) -->
  <path d="M20,20 L50,20 L50,25 L25,25 L25,50 L20,50Z" fill="#000"/>
  <path d="M780,20 L750,20 L750,25 L775,25 L775,50 L780,50Z" fill="#000"/>
  <path d="M20,580 L50,580 L50,575 L25,575 L25,550 L20,550Z" fill="#000"/>
  <path d="M780,580 L750,580 L750,575 L775,575 L775,550 L780,550Z" fill="#000"/>
</svg>