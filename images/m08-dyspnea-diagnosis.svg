<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <title>Module 08: Dyspnea Differential Diagnosis</title>
  <defs>
    <pattern id="hatch-45" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <pattern id="cross-hatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="4" stroke="#000" stroke-width="0.6"/>
      <line x1="4" y1="0" x2="0" y2="4" stroke="#000" stroke-width="0.6"/>
    </pattern>
    <pattern id="dense-hatch" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <pattern id="stipple" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="1" cy="1" r="0.5" fill="#000"/>
      <circle cx="4" cy="4" r="0.5" fill="#000"/>
    </pattern>
    <pattern id="stipple-dense" patternUnits="userSpaceOnUse" width="4" height="4">
      <circle cx="1" cy="1" r="0.6" fill="#000"/>
      <circle cx="3" cy="3" r="0.6" fill="#000"/>
    </pattern>
    <pattern id="sand" patternUnits="userSpaceOnUse" width="4" height="4">
      <circle cx="1" cy="1" r="0.4" fill="#000"/>
      <circle cx="3" cy="2" r="0.3" fill="#000"/>
      <circle cx="2" cy="3.5" r="0.4" fill="#000"/>
    </pattern>
    <clipPath id="sector-l">
      <path d="M133,85 L40,355 L226,355 Z"/>
    </clipPath>
    <clipPath id="sector-c">
      <path d="M400,85 L307,355 L493,355 Z"/>
    </clipPath>
    <clipPath id="sector-r">
      <path d="M667,85 L574,355 L760,355 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#fff"/>
  <rect x="5" y="5" width="790" height="590" fill="none" stroke="#000" stroke-width="5"/>
  <rect x="10" y="10" width="780" height="580" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Title -->
  <rect x="15" y="15" width="770" height="50" fill="#000"/>
  <text x="400" y="38" font-family="serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Module 08: Dyspnea — Differential Diagnosis</text>
  <text x="400" y="56" font-family="serif" font-size="14" fill="#fff" text-anchor="middle">呼吸困難鑑別診斷 — 肺部超音波</text>

  <!-- ======= PANEL 1: Normal Lung / A-lines (Left) ======= -->
  <rect x="18" y="72" width="248" height="520" fill="none" stroke="#000" stroke-width="3"/>
  <rect x="28" y="78" width="228" height="30" fill="#000"/>
  <text x="142" y="98" font-family="serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">正常肺 Normal A-lines</text>

  <!-- B-mode sector (upper part) -->
  <path d="M133,118 L45,350 L221,350 Z" fill="#000" stroke="#000" stroke-width="3"/>

  <!-- Tissue background -->
  <path d="M133,118 L45,350 L221,350 Z" fill="url(#stipple)" stroke="none" clip-path="url(#sector-l)"/>

  <!-- Two ribs at top -->
  <!-- Left rib -->
  <ellipse cx="88" cy="160" rx="22" ry="10" fill="url(#cross-hatch)" stroke="#fff" stroke-width="2"/>
  <!-- Rib shadow below left rib -->
  <path d="M70,170 L60,350" stroke="#fff" stroke-width="0.5" stroke-dasharray="2,3"/>

  <!-- Right rib -->
  <ellipse cx="178" cy="160" rx="22" ry="10" fill="url(#cross-hatch)" stroke="#fff" stroke-width="2"/>

  <!-- Pleural line (bright horizontal line between ribs) -->
  <line x1="100" y1="178" x2="166" y2="178" stroke="#fff" stroke-width="3.5"/>
  <text x="185" y="182" font-family="monospace" font-size="7" fill="#fff">Pleura</text>

  <!-- A-lines (equidistant horizontal reverberation artifacts) -->
  <line x1="85" y1="218" x2="181" y2="218" stroke="#fff" stroke-width="2.5"/>
  <line x1="78" y1="258" x2="188" y2="258" stroke="#fff" stroke-width="2"/>
  <line x1="70" y1="298" x2="196" y2="298" stroke="#fff" stroke-width="1.5"/>
  <line x1="62" y1="338" x2="204" y2="338" stroke="#fff" stroke-width="1"/>

  <!-- A-line labels -->
  <text x="210" y="222" font-family="monospace" font-size="6" fill="#fff">A1</text>
  <text x="216" y="262" font-family="monospace" font-size="6" fill="#fff">A2</text>
  <text x="222" y="302" font-family="monospace" font-size="6" fill="#fff">A3</text>

  <!-- Equidistant arrows -->
  <line x1="55" y1="178" x2="55" y2="218" stroke="#fff" stroke-width="1"/>
  <line x1="52" y1="178" x2="58" y2="178" stroke="#fff" stroke-width="1"/>
  <line x1="52" y1="218" x2="58" y2="218" stroke="#fff" stroke-width="1"/>
  <text x="48" y="200" font-family="monospace" font-size="6" fill="#fff" text-anchor="end">d</text>

  <line x1="55" y1="218" x2="55" y2="258" stroke="#fff" stroke-width="1"/>
  <line x1="52" y1="258" x2="58" y2="258" stroke="#fff" stroke-width="1"/>
  <text x="48" y="240" font-family="monospace" font-size="6" fill="#fff" text-anchor="end">d</text>

  <!-- Sector border -->
  <path d="M133,118 L45,350 L221,350 Z" fill="none" stroke="#fff" stroke-width="2"/>

  <!-- M-mode: Seashore Sign (bottom section) -->
  <rect x="30" y="362" width="236" height="140" fill="#000" stroke="#000" stroke-width="3"/>
  <text x="148" y="378" font-family="monospace" font-size="9" fill="#fff" text-anchor="middle">M-mode: Seashore Sign</text>

  <!-- Horizontal stratosphere lines (above pleural line in M-mode) -->
  <line x1="35" y1="395" x2="261" y2="395" stroke="#fff" stroke-width="1.2"/>
  <line x1="35" y1="403" x2="261" y2="403" stroke="#fff" stroke-width="0.8"/>
  <line x1="35" y1="411" x2="261" y2="411" stroke="#fff" stroke-width="1"/>
  <line x1="35" y1="419" x2="261" y2="419" stroke="#fff" stroke-width="0.6"/>

  <!-- Pleural line in M-mode -->
  <line x1="35" y1="425" x2="261" y2="425" stroke="#fff" stroke-width="2.5"/>

  <!-- Sandy/granular pattern below (seashore = lung sliding) -->
  <rect x="35" y="425" width="226" height="72" fill="url(#sand)" clip-path="none"/>
  <!-- Additional granular texture -->
  <g opacity="0.8">
    <circle cx="50" cy="440" r="1" fill="#fff"/><circle cx="65" cy="445" r="0.8" fill="#fff"/>
    <circle cx="80" cy="435" r="1" fill="#fff"/><circle cx="95" cy="448" r="0.7" fill="#fff"/>
    <circle cx="110" cy="438" r="0.9" fill="#fff"/><circle cx="125" cy="442" r="1" fill="#fff"/>
    <circle cx="140" cy="435" r="0.8" fill="#fff"/><circle cx="155" cy="450" r="1" fill="#fff"/>
    <circle cx="170" cy="440" r="0.7" fill="#fff"/><circle cx="185" cy="446" r="0.9" fill="#fff"/>
    <circle cx="200" cy="436" r="1" fill="#fff"/><circle cx="215" cy="443" r="0.8" fill="#fff"/>
    <circle cx="230" cy="438" r="1" fill="#fff"/><circle cx="245" cy="448" r="0.7" fill="#fff"/>
    <circle cx="55" cy="460" r="0.8" fill="#fff"/><circle cx="70" cy="455" r="1" fill="#fff"/>
    <circle cx="85" cy="465" r="0.7" fill="#fff"/><circle cx="100" cy="458" r="0.9" fill="#fff"/>
    <circle cx="115" cy="468" r="1" fill="#fff"/><circle cx="130" cy="455" r="0.8" fill="#fff"/>
    <circle cx="145" cy="462" r="0.7" fill="#fff"/><circle cx="160" cy="470" r="1" fill="#fff"/>
    <circle cx="175" cy="458" r="0.8" fill="#fff"/><circle cx="190" cy="465" r="0.9" fill="#fff"/>
    <circle cx="205" cy="455" r="1" fill="#fff"/><circle cx="220" cy="468" r="0.7" fill="#fff"/>
    <circle cx="235" cy="460" r="0.8" fill="#fff"/><circle cx="250" cy="470" r="1" fill="#fff"/>
    <circle cx="48" cy="478" r="0.7" fill="#fff"/><circle cx="63" cy="485" r="1" fill="#fff"/>
    <circle cx="78" cy="475" r="0.8" fill="#fff"/><circle cx="93" cy="488" r="0.7" fill="#fff"/>
    <circle cx="108" cy="480" r="0.9" fill="#fff"/><circle cx="123" cy="490" r="1" fill="#fff"/>
    <circle cx="138" cy="478" r="0.8" fill="#fff"/><circle cx="153" cy="485" r="0.7" fill="#fff"/>
    <circle cx="168" cy="492" r="1" fill="#fff"/><circle cx="183" cy="480" r="0.8" fill="#fff"/>
    <circle cx="198" cy="488" r="0.9" fill="#fff"/><circle cx="213" cy="478" r="1" fill="#fff"/>
    <circle cx="228" cy="490" r="0.7" fill="#fff"/><circle cx="243" cy="482" r="0.8" fill="#fff"/>
  </g>

  <!-- Labels -->
  <text x="30" y="408" font-family="monospace" font-size="6" fill="#fff" transform="rotate(-90,30,408)">Waves</text>
  <text x="30" y="470" font-family="monospace" font-size="6" fill="#fff" transform="rotate(-90,30,470)">Sand</text>

  <!-- M-mode border -->
  <rect x="30" y="362" width="236" height="140" fill="none" stroke="#fff" stroke-width="1.5"/>

  <!-- Label -->
  <text x="142" y="520" font-family="serif" font-size="10" fill="#000" text-anchor="middle">Normal: A-lines + Pleural Sliding</text>
  <text x="142" y="535" font-family="serif" font-size="10" fill="#000" text-anchor="middle">正常：A-lines + 肋膜滑動</text>
  <text x="142" y="550" font-family="serif" font-size="9" fill="#000" text-anchor="middle" font-style="italic">M-mode: Seashore Sign 海灘徵象</text>


  <!-- ======= PANEL 2: Pulmonary Edema / B-lines (Center) ======= -->
  <rect x="275" y="72" width="250" height="520" fill="none" stroke="#000" stroke-width="3"/>
  <rect x="285" y="78" width="230" height="30" fill="#000"/>
  <text x="400" y="98" font-family="serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">肺水腫 B-lines</text>

  <!-- B-mode sector -->
  <path d="M400,118 L312,350 L488,350 Z" fill="#000" stroke="#000" stroke-width="3"/>
  <path d="M400,118 L312,350 L488,350 Z" fill="url(#stipple)" stroke="none" clip-path="url(#sector-c)"/>

  <!-- Two ribs -->
  <ellipse cx="352" cy="160" rx="22" ry="10" fill="url(#cross-hatch)" stroke="#fff" stroke-width="2"/>
  <ellipse cx="448" cy="160" rx="22" ry="10" fill="url(#cross-hatch)" stroke="#fff" stroke-width="2"/>

  <!-- Pleural line -->
  <line x1="368" y1="178" x2="434" y2="178" stroke="#fff" stroke-width="3.5"/>

  <!-- Multiple B-lines (vertical bright laser-like lines from pleura to bottom) -->
  <line x1="375" y1="178" x2="363" y2="348" stroke="#fff" stroke-width="2.5"/>
  <line x1="383" y1="178" x2="373" y2="348" stroke="#fff" stroke-width="2.5"/>
  <line x1="391" y1="178" x2="383" y2="348" stroke="#fff" stroke-width="3"/>
  <line x1="399" y1="178" x2="395" y2="348" stroke="#fff" stroke-width="2.5"/>
  <line x1="407" y1="178" x2="405" y2="348" stroke="#fff" stroke-width="2.5"/>
  <line x1="415" y1="178" x2="417" y2="348" stroke="#fff" stroke-width="3"/>
  <line x1="423" y1="178" x2="429" y2="348" stroke="#fff" stroke-width="2.5"/>
  <line x1="430" y1="178" x2="439" y2="348" stroke="#fff" stroke-width="2"/>

  <!-- B-lines are slightly wavy/comet-tail -->
  <path d="M387,200 Q385,240 384,280 Q383,320 380,348" fill="none" stroke="#fff" stroke-width="1" opacity="0.6"/>
  <path d="M411,200 Q413,240 414,280 Q415,320 418,348" fill="none" stroke="#fff" stroke-width="1" opacity="0.6"/>

  <!-- Sector label -->
  <text x="400" y="145" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">3+ B-lines/zone</text>

  <!-- Sector border -->
  <path d="M400,118 L312,350 L488,350 Z" fill="none" stroke="#fff" stroke-width="2"/>

  <!-- Schematic below: bilateral B-lines distribution -->
  <rect x="295" y="362" width="210" height="140" fill="#fff" stroke="#000" stroke-width="2.5"/>
  <text x="400" y="378" font-family="serif" font-size="9" fill="#000" text-anchor="middle" font-weight="bold">Bilateral B-lines Distribution</text>

  <!-- Simplified anterior chest diagram -->
  <!-- Left lung outline -->
  <path d="M330,395 Q320,410 318,440 Q320,470 335,488 L365,490 Q370,470 368,440 Q365,415 360,395 Z" fill="url(#hatch-45)" stroke="#000" stroke-width="2"/>
  <!-- Right lung outline -->
  <path d="M440,395 Q450,410 452,440 Q450,470 435,488 L405,490 Q400,470 402,440 Q405,415 410,395 Z" fill="url(#hatch-45)" stroke="#000" stroke-width="2"/>

  <!-- B-line markers (dots in both lungs = bilateral) -->
  <g fill="#000">
    <circle cx="338" cy="410" r="4"/><circle cx="355" cy="415" r="4"/>
    <circle cx="342" cy="435" r="4"/><circle cx="358" cy="440" r="4"/>
    <circle cx="340" cy="460" r="4"/><circle cx="355" cy="465" r="4"/>
    <circle cx="345" cy="480" r="3"/>
    <circle cx="432" cy="410" r="4"/><circle cx="415" cy="415" r="4"/>
    <circle cx="428" cy="435" r="4"/><circle cx="412" cy="440" r="4"/>
    <circle cx="430" cy="460" r="4"/><circle cx="415" cy="465" r="4"/>
    <circle cx="425" cy="480" r="3"/>
  </g>

  <!-- Heart in center -->
  <path d="M375,420 Q385,410 395,420 Q405,410 415,420 L395,450 Z" fill="#000" stroke="#000" stroke-width="2"/>

  <!-- Sternum -->
  <line x1="385" y1="390" x2="385" y2="495" stroke="#000" stroke-width="2"/>

  <!-- Legend -->
  <circle cx="310" cy="492" r="3" fill="#000"/>
  <text x="318" y="495" font-family="serif" font-size="8" fill="#000">= B-lines zone (+)</text>

  <!-- Labels -->
  <text x="400" y="520" font-family="serif" font-size="10" fill="#000" text-anchor="middle">Pulmonary Edema: Bilateral B-lines</text>
  <text x="400" y="535" font-family="serif" font-size="10" fill="#000" text-anchor="middle">肺水腫：雙側 B-lines (&ge;3條/區)</text>
  <text x="400" y="550" font-family="serif" font-size="9" fill="#000" text-anchor="middle" font-style="italic">B-lines = 垂直高回音線（彗星尾）</text>


  <!-- ======= PANEL 3: Pleural Effusion (Right) ======= -->
  <rect x="532" y="72" width="250" height="520" fill="none" stroke="#000" stroke-width="3"/>
  <rect x="542" y="78" width="230" height="30" fill="#000"/>
  <text x="657" y="98" font-family="serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">胸腔積液 Pleural Effusion</text>

  <!-- B-mode sector -->
  <path d="M667,118 L579,350 L755,350 Z" fill="#000" stroke="#000" stroke-width="3"/>
  <path d="M667,118 L579,350 L755,350 Z" fill="url(#stipple)" stroke="none" clip-path="url(#sector-r)"/>

  <!-- Chest wall / ribs at top -->
  <path d="M667,118 L610,220 L724,220 Z" fill="url(#dense-hatch)" stroke="none" clip-path="url(#sector-r)"/>
  <text x="667" y="180" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">Chest Wall</text>

  <!-- Diaphragm (bright curved line) -->
  <path d="M595,280 Q620,260 667,255 Q714,260 739,280" fill="none" stroke="#fff" stroke-width="3"/>
  <text x="740" y="270" font-family="monospace" font-size="7" fill="#fff">Diaphragm</text>

  <!-- Anechoic fluid collection (black space above diaphragm) -->
  <path d="M608,222 L595,280 Q620,260 667,255 Q714,260 739,280 L726,222 Z" fill="#000" stroke="none" clip-path="url(#sector-r)"/>

  <!-- Fluid label -->
  <text x="667" y="248" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">FLUID</text>
  <text x="667" y="260" font-family="monospace" font-size="7" fill="#fff" text-anchor="middle">(anechoic)</text>

  <!-- Compressed lung tissue floating in fluid -->
  <path d="M620,228 Q640,220 667,218 Q694,220 714,228 L710,240 Q690,235 667,232 Q644,235 624,240 Z" fill="url(#cross-hatch)" stroke="#fff" stroke-width="1.5"/>
  <text x="667" y="224" font-family="monospace" font-size="7" fill="#fff" text-anchor="middle">Lung</text>

  <!-- Liver below diaphragm (tissue-like echogenicity) -->
  <path d="M595,280 Q620,260 667,255 Q714,260 739,280 L750,348 L584,348 Z" fill="url(#dense-hatch)" stroke="none" clip-path="url(#sector-r)"/>
  <!-- Liver label -->
  <text x="667" y="320" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle">Liver</text>

  <!-- Spine sign: vertebral bodies visible through effusion (past diaphragm) -->
  <!-- Vertebral body echoes -->
  <rect x="660" y="285" width="14" height="18" fill="#fff" stroke="#fff" stroke-width="1"/>
  <rect x="660" y="310" width="14" height="18" fill="#fff" stroke="#fff" stroke-width="1"/>
  <rect x="660" y="335" width="14" height="15" fill="#fff" stroke="#fff" stroke-width="1"/>
  <!-- Spine label -->
  <text x="685" y="305" font-family="monospace" font-size="7" fill="#fff">Spine</text>
  <text x="685" y="315" font-family="monospace" font-size="7" fill="#fff">Sign (+)</text>

  <!-- Sector border -->
  <path d="M667,118 L579,350 L755,350 Z" fill="none" stroke="#fff" stroke-width="2"/>

  <!-- Schematic below: spine sign explanation -->
  <rect x="548" y="362" width="220" height="140" fill="#fff" stroke="#000" stroke-width="2.5"/>
  <text x="658" y="378" font-family="serif" font-size="9" fill="#000" text-anchor="middle" font-weight="bold">Spine Sign 脊椎徵象</text>

  <!-- Simplified diagram of spine sign -->
  <!-- Diaphragm line -->
  <path d="M570,430 Q620,415 658,412 Q696,415 746,430" fill="none" stroke="#000" stroke-width="2.5"/>
  <text x="750" y="425" font-family="serif" font-size="7" fill="#000">橫膈</text>

  <!-- Above diaphragm: spine visible (effusion present) -->
  <text x="610" y="400" font-family="serif" font-size="8" fill="#000" text-anchor="middle">Effusion</text>
  <!-- Vertebrae above diaphragm (visible = spine sign +) -->
  <rect x="652" y="392" width="12" height="12" fill="url(#cross-hatch)" stroke="#000" stroke-width="1.5"/>
  <rect x="652" y="408" width="12" height="12" fill="url(#cross-hatch)" stroke="#000" stroke-width="1.5"/>
  <rect x="652" y="424" width="12" height="12" fill="url(#cross-hatch)" stroke="#000" stroke-width="1.5"/>

  <!-- Below diaphragm: spine visible (always) -->
  <rect x="652" y="440" width="12" height="12" fill="url(#cross-hatch)" stroke="#000" stroke-width="1.5"/>
  <rect x="652" y="456" width="12" height="12" fill="url(#cross-hatch)" stroke="#000" stroke-width="1.5"/>
  <rect x="652" y="472" width="12" height="12" fill="url(#cross-hatch)" stroke="#000" stroke-width="1.5"/>
  <text x="610" y="460" font-family="serif" font-size="8" fill="#000" text-anchor="middle">Liver</text>

  <!-- Bracket showing spine visible above diaphragm -->
  <path d="M672" y="392 L680,392 L680,435 L672,435" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M672,392 L680,392 L680,435 L672,435" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="688" y="416" font-family="serif" font-size="7" fill="#000">Spine visible</text>
  <text x="688" y="426" font-family="serif" font-size="7" fill="#000">above diaphragm</text>

  <!-- Normal comparison: spine NOT visible above diaphragm -->
  <text x="658" y="496" font-family="serif" font-size="8" fill="#000" text-anchor="middle" font-style="italic">正常時脊椎在橫膈以上不可見</text>

  <!-- Labels -->
  <text x="657" y="520" font-family="serif" font-size="10" fill="#000" text-anchor="middle">Pleural Effusion + Spine Sign</text>
  <text x="657" y="535" font-family="serif" font-size="10" fill="#000" text-anchor="middle">胸腔積液 + 脊椎徵象陽性</text>
  <text x="657" y="550" font-family="serif" font-size="9" fill="#000" text-anchor="middle" font-style="italic">無回音液體 + 壓縮肺葉漂浮</text>

  <!-- Bottom border decoration -->
  <line x1="20" y1="565" x2="780" y2="565" stroke="#000" stroke-width="1"/>
  <line x1="20" y1="568" x2="780" y2="568" stroke="#000" stroke-width="0.5"/>
  <text x="400" y="583" font-family="serif" font-size="10" fill="#000" text-anchor="middle" font-style="italic">Point-of-Care Ultrasound — Lung Emergency Findings</text>
</svg>