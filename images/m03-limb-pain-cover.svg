<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="1.2"/>
      <line x1="0" y1="0" x2="6" y2="0" stroke="#000" stroke-width="1.2"/>
    </pattern>
    <pattern id="hatch-dense" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#000" stroke-width="1"/>
    </pattern>
    <pattern id="hatch-light" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#000" stroke-width="0.7"/>
    </pattern>
    <pattern id="hatch-muscle" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(60)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#000" stroke-width="0.6"/>
    </pattern>
    <pattern id="hatch-skin" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#fff"/>

  <!-- Border frame -->
  <rect x="8" y="8" width="784" height="584" fill="none" stroke="#000" stroke-width="5"/>
  <rect x="14" y="14" width="772" height="572" fill="none" stroke="#000" stroke-width="2"/>

  <!-- LEG (thigh cross-section view from the side) -->
  <!-- Upper leg outline - large oval/thigh shape -->
  <path d="M150,150 C100,180 60,260 50,350 C40,440 70,500 120,530 L680,530 C730,500 760,440 750,350 C740,260 700,180 650,150Z" fill="#fff" stroke="#000" stroke-width="5"/>

  <!-- Skin layer hatching -->
  <path d="M150,150 C100,180 60,260 50,350 C40,440 70,500 120,530 L680,530 C730,500 760,440 750,350 C740,260 700,180 650,150Z" fill="url(#hatch-skin)" stroke="none"/>

  <!-- Subcutaneous fat layer -->
  <path d="M180,175 C140,200 105,270 95,350 C85,430 110,485 150,510 L650,510 C690,485 715,430 705,350 C695,270 660,200 620,175Z" fill="#fff" stroke="#000" stroke-width="3"/>

  <!-- Muscle layer -->
  <path d="M210,200 C175,225 145,285 138,355 C130,425 152,472 185,492 L615,492 C648,472 670,425 662,355 C655,285 625,225 590,200Z" fill="url(#hatch-muscle)" stroke="#000" stroke-width="3"/>

  <!-- Inner muscle compartment -->
  <path d="M250,235 C225,255 200,305 195,365 C190,425 205,458 230,472 L570,472 C595,458 610,425 605,365 C600,305 575,255 550,235Z" fill="#fff" stroke="#000" stroke-width="2"/>
  <path d="M250,235 C225,255 200,305 195,365 C190,425 205,458 230,472 L570,472 C595,458 610,425 605,365 C600,305 575,255 550,235Z" fill="url(#hatch-light)" stroke="none"/>

  <!-- FEMORAL VEIN (larger, medial) -->
  <circle cx="350" cy="360" r="45" fill="#fff" stroke="#000" stroke-width="4"/>
  <!-- Vein wall detail -->
  <circle cx="350" cy="360" r="40" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <!-- Vein lumen -->
  <circle cx="350" cy="360" r="35" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <!-- Label -->
  <text x="350" y="365" font-family="sans-serif" font-size="13" fill="#000" text-anchor="middle" font-weight="bold">FV</text>
  <text x="350" y="320" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle">Femoral</text>
  <text x="350" y="308" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle">Vein</text>

  <!-- FEMORAL ARTERY (smaller, lateral) -->
  <circle cx="470" cy="340" r="30" fill="#fff" stroke="#000" stroke-width="5"/>
  <!-- Artery wall (thicker) -->
  <circle cx="470" cy="340" r="25" fill="#fff" stroke="#000" stroke-width="3"/>
  <circle cx="470" cy="340" r="20" fill="#fff" stroke="#000" stroke-width="1"/>
  <!-- Artery pulsation marks -->
  <path d="M470,305 C475,302 480,305 480,305" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M470,300 C477,296 485,300 485,300" fill="none" stroke="#000" stroke-width="1"/>
  <!-- Label -->
  <text x="470" y="345" font-family="sans-serif" font-size="13" fill="#000" text-anchor="middle" font-weight="bold">FA</text>
  <text x="510" y="330" font-family="sans-serif" font-size="10" fill="#000" text-anchor="start">Femoral</text>
  <text x="510" y="343" font-family="sans-serif" font-size="10" fill="#000" text-anchor="start">Artery</text>

  <!-- SAPHENOUS VEIN (small, superficial) -->
  <circle cx="290" cy="430" r="15" fill="#fff" stroke="#000" stroke-width="3"/>
  <text x="290" y="434" font-family="sans-serif" font-size="8" fill="#000" text-anchor="middle">GSV</text>

  <!-- Femur (bone cross-section) -->
  <circle cx="400" cy="420" r="35" fill="#fff" stroke="#000" stroke-width="5"/>
  <circle cx="400" cy="420" r="28" fill="url(#crosshatch)" stroke="#000" stroke-width="2"/>
  <circle cx="400" cy="420" r="15" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="400" y="424" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle">Femur</text>

  <!-- ULTRASOUND PROBE pressing down on the leg -->
  <!-- Probe body -->
  <rect x="320" y="80" width="60" height="80" rx="8" fill="#000" stroke="#000" stroke-width="3"/>
  <!-- Probe face -->
  <rect x="325" y="155" width="50" height="12" rx="4" fill="#fff" stroke="#000" stroke-width="3"/>
  <!-- Probe indicator -->
  <circle cx="335" cy="105" r="4" fill="#fff"/>
  <!-- Probe label -->
  <rect x="328" y="115" width="44" height="18" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="350" y="128" font-family="sans-serif" font-size="7" fill="#000" text-anchor="middle">LINEAR</text>
  <!-- Cable -->
  <path d="M350,80 C350,60 370,40 400,30 C430,20 470,25 500,40" fill="none" stroke="#000" stroke-width="3"/>
  <path d="M500,40 C530,55 550,50 560,40" fill="none" stroke="#000" stroke-width="3"/>

  <!-- Pressure arrows (showing compression) -->
  <line x1="350" y1="45" x2="350" y2="70" stroke="#000" stroke-width="3"/>
  <polygon points="350,75 343,65 357,65" fill="#000"/>
  <line x1="320" y1="55" x2="335" y2="72" stroke="#000" stroke-width="2"/>
  <polygon points="337,74 330,65 340,68" fill="#000"/>
  <line x1="380" y1="55" x2="365" y2="72" stroke="#000" stroke-width="2"/>
  <polygon points="363,74 370,65 360,68" fill="#000"/>
  <text x="350" y="40" font-family="sans-serif" font-size="12" fill="#000" text-anchor="middle" font-weight="bold">COMPRESS</text>

  <!-- Ultrasound beam from probe into tissue -->
  <line x1="330" y1="167" x2="310" y2="250" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="370" y1="167" x2="390" y2="250" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="350" y1="167" x2="350" y2="250" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Hand gripping probe -->
  <!-- Left hand -->
  <path d="M295,95 C285,100 278,110 280,125 C282,135 290,145 300,148 L318,145 L318,100 C315,95 305,90 295,95Z" fill="#fff" stroke="#000" stroke-width="3"/>
  <!-- Finger lines -->
  <line x1="290" y1="110" x2="295" y2="120" stroke="#000" stroke-width="1.5"/>
  <line x1="287" y1="115" x2="293" y2="128" stroke="#000" stroke-width="1.5"/>
  <line x1="285" y1="122" x2="291" y2="135" stroke="#000" stroke-width="1.5"/>
  <!-- Right hand -->
  <path d="M405,95 C415,100 422,110 420,125 C418,135 410,145 400,148 L382,145 L382,100 C385,95 395,90 405,95Z" fill="#fff" stroke="#000" stroke-width="3"/>
  <line x1="410" y1="110" x2="405" y2="120" stroke="#000" stroke-width="1.5"/>
  <line x1="413" y1="115" x2="407" y2="128" stroke="#000" stroke-width="1.5"/>
  <line x1="415" y1="122" x2="409" y2="135" stroke="#000" stroke-width="1.5"/>

  <!-- DVT text annotation on the side -->
  <rect x="580" y="200" width="180" height="80" fill="#fff" stroke="#000" stroke-width="3"/>
  <text x="670" y="225" font-family="sans-serif" font-size="12" fill="#000" text-anchor="middle" font-weight="bold">DVT Assessment:</text>
  <text x="670" y="245" font-family="sans-serif" font-size="11" fill="#000" text-anchor="middle">2-point compression</text>
  <text x="670" y="262" font-family="sans-serif" font-size="11" fill="#000" text-anchor="middle">at CFV and PV</text>
  <!-- Arrow from annotation to vein -->
  <line x1="580" y1="250" x2="400" y2="350" stroke="#000" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Tissue layer labels on the left -->
  <text x="30" y="160" font-family="sans-serif" font-size="10" fill="#000">Skin</text>
  <line x1="55" y1="158" x2="140" y2="158" stroke="#000" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="30" y="195" font-family="sans-serif" font-size="10" fill="#000">Subcut.</text>
  <line x1="70" y1="193" x2="170" y2="193" stroke="#000" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="30" y="235" font-family="sans-serif" font-size="10" fill="#000">Muscle</text>
  <line x1="70" y1="233" x2="200" y2="233" stroke="#000" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Title area at bottom -->
  <rect x="200" y="545" width="400" height="40" fill="#000"/>
  <text x="400" y="572" font-family="serif" font-size="22" fill="#fff" text-anchor="middle" font-weight="bold">Module 03: Acute Limb Pain</text>

  <!-- Decorative corners -->
  <path d="M15,15 L45,15 L45,19 L19,19 L19,45 L15,45Z" fill="#000"/>
  <path d="M785,15 L755,15 L755,19 L781,19 L781,45 L785,45Z" fill="#000"/>
  <path d="M15,585 L45,585 L45,581 L19,581 L19,555 L15,555Z" fill="#000"/>
  <path d="M785,585 L755,585 L755,581 L781,581 L781,555 L785,555Z" fill="#000"/>
</svg>